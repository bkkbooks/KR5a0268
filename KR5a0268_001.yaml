body:
  text: 土無正形真土挨排四象狀若明窗塵生真土金若黍米液大還丹若玄珠參妻臣水銀流珠玉液神水姹女玄女木液白雪碧眼胡兒青衣女子汞東海青龍交梨浮陰火白賓客民子天魂丹基黑龜精陽中真陰下弦銀半斤已上汞之異名金丹大丹內丹還丹神丹真鉛大藥嬰兒谷神聖胎刀圭七返玉壺丹紫金丹絳雪丹赤赫金丹龍虎大藥金液還丹玉液還丹九轉丹紫金霜真黃芽真陰陽真玄牝名真父母真龍虎真種子真主人真鉛汞真一宇宙之主秋石河車金公金妃陽丹金鼎君黃男三五一美金花摩尼珠白馬牙水中金玉藥金砂神符白雪龜精鳳髓兔髓烏肝日魂月魄壺中日月先天地精太一含真氣商夫君金液金華玉池華池嬰兒黃男金精黃芽白頭老子素練郎君鉛西山白虎火棗沉黃芽鉛主人父母地𩲸丹母赤鳳髓陰中真陽上弦金八兩已上鉛之異名鼎周圍一尺五寸中虛五寸長一尺懸二懸寸狀似蓬壺亦如人之身形分胎三層應胎三才鼎身腹通直令上中下等均勻鼎入爐八寸懸於竈中不著地鼎懸胎是也又謂之朱砂鼎張隨注云又名太一神爐滿庭芳真鐵牛兒形容醜惡性剛偏好爭馳人人皆鐵有那箇解牽騎種就黃芽滿鐵院更須用牛神水澆之中宫裏若無此獸安得似嬰兒乾坤真動靜牛生成家活總賴於伊飢餐虎髓渴飲水銀池夜半牽車進火霞光迸海底騰輝牧童笑華池宴罷乘箇月明歸爐面周圍約一尺二寸明心橫有偃一尺立唇環匝二寸唇厚二寸月爐口偃開鍋釜又如仰月狀故爐名偃月爐也張隨注云又名威光鼎也挨排四象生真土詩東方青龍西白虎南面朱雀北玄武四獸猙獰不可當定計將軍能作主兩手擒來合戰時正見中秋月當午殺氣驚天動鬼神用盡周星震區宇須臾戰罷兵器收産顆明珠號真土鍊鉛火候三十文爻七十武二百六十分明數首尾須教用武烹中間文火溫溫煮爐中鍊出五彩光赫赫一粒大如黍將來掌上和殼吞逍遙永作真仙侣火記六百篇火記六百篇十月如轉轂朝昏各一卦屯蒙相趁逐子時發陽火二百一十六午時起陰爻十八八箇足鉛消汞自乾熏蒸丹已熟陰盡變純陽體貌如瓊玉沐浴刑德同生殺加臨二八門丹砂宜沐浴神水灌靈根閉兊留金汞禁關養魄魂不須行火候爐裏自溫溫抱一國富民安後修成體屬乾凝神歸妙道抱一守丹田去住渾無礙升騰任自然九年功滿日獨步大羅仙七言四韻凡一十六首一不求大道出迷塗縱負賢才豈丈夫百歲光陰石火爍一生身世水泡浮只貪利祿求榮顯不顧形容暗悴枯試問堆金等山嶽無常買得不來無二人生雖有百年期壽夭窮通莫預知昨日街頭猶走馬今朝棺內已眠尸妻財遺下非君有罪業將行難自欺大藥不求爭得遇遇之不鍊是愚癡右二章真人以此感悟世人惟恐或後故列之於首三學仙須是學天仙葉士表曰仙有千種天仙者形神俱妙與道合真聚則成形散則成氣學此道者當內外虛明表裏瑩徹如立一塵則成滲漏惟有金丹最的端李筌曰還丹之術百數此謂金丹者金液大還丹也參同契曰金來歸性初乃得稱還丹蓋金為藥母金吐其液復還丹田謂之金液還丹也魏師吕先天大學書曰夫金丹者先天一氣之祖後天而生兩儀三才萬物之母易曰乾元者始而亨者也萬物資之以始能以美利利天下而不言所利者有剛健中正純粹之德功成退位居偏乾居亥位寄體北方水中坎之中爻是也聖人能返而歸根復命與元神道合生生無窮總括萬象謂之得一故强名曰丹非法術也是乾道變化陰陽不測之謂也象易太極無上至真之妙包含性命之宗內易曰中爻之義是謂造化金碧經曰神室者丹之樞轄在坎離一二數參同契曰金來歸性初乃得稱還丹謂之金液歸真形神俱妙之道至簡至易一得永得所以萬論千經能變化自然生神得其口訣雖至愚小人立躋聖位是以天機祕惜不許授之非人輕泄妄傳殃及九祖是知金丹者無上至真之徑路也黃帝修之以登雲天後世成真合道頓超生死盡因金丹而成真人曰屈指從今飛步者盡因金液出塵寰即此義也二物會時情性合五行全處虎龍蟠真一子曰金者情也水者性也金生於水猶情生於性水隱於金猶情復於性或曰金為母何得謂之情邪而參同契曰金為水母母隱子者是也交會則金水混融全聚則虎龍蟠結故下章云既驅二物歸黃道爭得靈丹不解生參同契曰坎為水為月在人為腎腎臟生精精中有正陽之氣炎升于上精陰氣陽故鉛柔而銀剛虎性屬金而金能生水顚倒取之母隱子胎故虎向水中生也虎乃配鉛陰中之陽也離為火為日在人為心心臟生血中有真一之液流降于下血陽液陰故砂陽而汞陰龍性屬木而木能生火顚倒取之故母隱子胎龍從火裏出也龍亦配汞陽中之陰也本因戊己為媒娉遂使夫妻鎮合歡葉士表曰坎離納戊己戊己坎離中氣言前二物因中氣升降生成配合也無名子曰戊己屬土謂之黃婆龍虎金木間隔東西黃婆使之會合豈非媒娉乎只候功成朝北闕九霞光裏駕祥鸞四此法真中妙更真都緣我獨異於人自知顚倒由離坎誰識浮沉定主賔葉士表曰五位相得而名有合乾納甲壬一九成十坤納乙癸四六成十艮丙震庚三七成十巽辛兊丁二八成十坎離戊己共得十五顚倒上下不變所以顚倒升降皆由之也鉛沉汞浮沉者為主浮者為客袁公輔曰惟其如此是以古之真仙上聖皆知陰陽顚倒在坎離兩卦但世罕有識得浮沉主賓者故高象先云舉世無人識河車是也金鼎欲留朱裏汞玉池先下水中銀葉士表曰此言浮沉主客也離火生汞坎水生金汞因鉛結鉛制汞伏乃子母相應也參同契曰河上姹女靈而最神得火則飛不見埃塵鬼匿龍潜莫知所存將欲制之黃芽為銀真一子曰黃芽鉛也此兩句正應得上文顚倒坎離之說大易志圖曰陰中有陽者象鉛中有陰也黃芽産於河車之中歌曰黃芽鉛汞造陰殼含陽華篇意謂必先驅龍下就虎之氣然後方得二氣交合可以施功鍛鍊結成真一之精也神功運火非終夕現出深潭日一輪葉士表曰天地運神功以生萬物人能法天地以運符火不待旦夕之間元海陽光生也真人謂一時辰內管丹成即此義也無名子曰火即二弦之氣非終旦者明一時之中金丹之成也此法外藥法象也五虎躍龍騰風浪粗中央正位産玄珠果生枝上終期熟子在胞中豈有殊葉士表曰坎離之氣如雲龍風虎奔騰飛躍至中宫産元珠也珠者金母所生真汞參同契曰溫養子珠是也如果生枝上子在胎中待其數足也袁公輔曰騰躍浪粗者言二物難調伏之狀若中宫能正其位故能吸引二物之精於中宫生長真汞如果生枝上子育胞中待其數足而成也資生經曰臍下三寸為下丹田方圓四寸著脊梁兩腎中間左青右白上黃下黑中央赤名大海而貯其血氣亦名大中極言取人身上下四向最為中也中央正位即丹田金胎神室也南北宗源翻卦象晨昏火候合天樞葉士表曰坎離上下有既濟未濟之象朝屯暮蒙一一合天之樞機也象川翁曰子為六陽之首故為晨用屯卦直事進火之候也午為六陰之首故為昏用蒙卦直事進水之候也一日之間用兩卦直事至三十日終於既濟未濟二卦終而復始一日兩卦直事連牝牡四卦一月計六十四卦一卦六爻六十四卦計三百八十四爻一年並閏餘之數皆依斗建而運之故曰合天樞也無名子曰閏餘之數乾之初九起於坤之初六乾之策三十有六六爻計二百一十有六坤之初六起於乾之初九坤之策二十有四六爻計一百四十有四總而計之三百六十應周天之度日月行度交合升降不出卦爻之內月行速一月一周天日行遲一歲一周天天樞者斗樞也一晝夜一周天而一月一移也如正月建寅二月建卯是也且如正月建寅立春戌時指艮雨水戌時指寅故曰月月常加戌時時見破軍上古至人知日月盈虧明陰陽上下行子午符火日有晝夜數月應時加减然後暗合天度故曰合天樞也至道至妙妙在於斯坎離升降生産靈藥結成黃芽袁公輔曰子午為坎離之宗源循歷十二位翻諸卦爻朝屯暮蒙為六十卦符火之首要一一合天之樞機也須知大隱居鄽市何必深山守靜孤葉士表曰此言得法與不得法得法者雖居市朝可為也袁公輔曰苟得其法雖不在深山窮谷可修持也六人人盡有長生藥自是愚迷枉擺拋葉士表曰人之初生均受一點元陽之氣為養命之本男子自二八而真精泄女子自二七而天癸降然後有夫妻之欲衆生迷蒙醉於情愛日夜漏泄不知其幾何也本去根枯之死必矣世人但知養生止於禁欲殊不知一念若動氣隨心散精逐氣亡為此道者當心體大虛內外如一然後可以論金液大還丹之道也甘露降時天地合黃芽生處坎離交葉士表曰天地相合以降甘露人身抱沖和之氣與天地等若能離形去智淡然無欲則真氣流行上徹天谷如甘露降矣坎離升降生産靈汞結成黃芽袁公輔曰天地相合以降甘露坎離相交以生黃芽真人以四者取譬盡乾坤坎離也井蛙應謂無龍窟籬鷗爭知有鳳巢葉士表曰此喻無知小人所見卑淺不信大丹有换骨回陽超凡入聖之妙沉於嗜欲毀訾至真如井蛙樂於勺水籬鷗居於寸地不知大海有龍宫之富鄧林有鳳巢之廣也袁公輔曰蓋世之愚迷之徒不知有大道日肆戕賊虧耗真源終至死壞而不悔如井蛙不知有大海籬鷗不知有鄧林也丹熟自然金滿屋何須尋草學燒茅葉士表曰金丹大藥本天地虛無自然之氣從無質而生丹熟則體變金玉發現神光巍巍堂堂證真金相豈同世俗尋草採藥易銅鐵之質哉袁公輔曰藥成之後金光透體奚用尋草燒茅以事假僞邪七要知産藥川源處只在西南是本鄉葉士表曰此言運符産藥也西南坤地乃太陰本鄉月三日生魄於西南故丹藥自坤而産也鉛遇癸生須急採金逢望遠不堪嘗葉士表曰癸亦坤坤納癸言藥本太陰之氣隨月初生便當採也十五以後月虧氣减不宜採矣太陰即太陽氣也月本無光因日生明一陽為震月初生也二陽為兊月上弦也三陽為乾月盈滿也袁公輔曰自月初生為一陽起震卦至十五為三陽屬乾卦陽極陰生故十五已後月虧氣减以應三陰秋冬肅殺之氣不宜採也苟於十五已後採之是為孤陰易傳云獨陰不生獨陽不成象川翁曰鉛遇癸生須急採金逢望遠不堪嘗言鉛與金即金丹也以癸日子時用功急採不得逾時也葉文叔以减坤納癸誤矣一本作癸日子時者是矣蓋癸日遁得壬子時夭壬地癸會于北方故朱震易傳曰晦日朔旦坎月離日會于壬癸坎月戊也離日己也又曰三日暮震象月出庚八日兊象月見丁十五日乾象月盈甲壬十六日旦巽象月退辛二十三日艮象月消丙三十日坤象月减乙藏癸晦日朔旦坎水流戊日中離火就己無名子曰鉛遇癸生癸生者時將丑也金逢望遠望遠者月將虧也月之圓存乎口訣時之子妙在心傳周天息數微微數玉漏寒聲滴滴符此真人口口相傳之密㫖也送歸土釜牢封閉葉士表曰此言一日所得之藥土釜中宫也封閉使真氣不泄耳參同契曰三者既關鍵緩體處空房委志歸虛無無念以為常袁公輔曰修神丹者能順則天地神機妙用取而法之不差於時不失於偏又能閉塞中宫不致滲漏始能與真汞相匹偶也次入流珠厮配當葉士表曰此言次日再運流珠入鼎與昨日所結之藥合和也無名子曰既得黍珠之後餌丹歸丹田土釜中固濟胞胎不泄運火飛珠之汞以配之則靈胎始結矣藥重一斤須二八調停火候托陰陽葉士表曰此言一鼎之火凡一鼎火計三十日三百六十時以應易數蓋易有六十四卦計三百八十四爻乾坤坎離四卦為鼎器藥物言之也若時日有虧爻符不足則藥不成矣參同契曰火記不虛作演易以明之偃月法爐鼎白虎為熬樞汞日為流珠青龍與之俱舉東以合西魂魄自相拘上弦兊數八下弦數亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾銖有三百八十四以應火候爻之數袁公輔曰藥須二八方成上下兩弦合一斤之數故得金虎木龍之精化為真丹人非陰陽兩備道不可成又非得火候調和烹鍊終不成大丹也真人切於付囑云象川翁曰烏肝八兩兔髓半斤合成一斤故曰須二八也大易志圖曰凡用火五日一候一月六候十二月七十二候以終一年之功一日有十二時三十日有三百六十時每日合一月用火象一年小周天十二月象十二年大周天而畢矣八休鍊三黃及四神若尋衆藥便非真葉士表曰混沌未判中具兩儀兩儀則五行生成之數也有性無形及乎太極既分則甲己之氣化真土乙庚之氣化真金丙辛之氣化真水丁壬之氣化真木戊癸之氣化真火此五者散而為物類也大丹之法無質生質亦若此矣為此道者知先天一氣之祖體虛無自然之數則造化不難奚假衆藥參同契曰近在我形不離己身抱一毋捨可以長存配以服食雌雄設陳挺除武都八石棄捐陰陽得類歸交感二八相當自合親參同契曰類同者相從事乖不成寶二八金木也金木相交則為夫妻所謂金伐木榮是也袁公輔曰陰陽得其類蓋歸之交感而然正如金木二八相交而成上下兩弦自合親者蓋不期然而然矣潭底日紅陰怪滅山頭月白藥苗新時人要識真鉛汞不是凡砂及水銀葉士表曰凡藥歸中宫凝結者為陽在外生産者為陰譬如月因日而有虧盈而日光元不動也袁公輔曰潭底日紅陰怪滅者謂太陰極於坤位再得太陽交合則山頭徒現黃芽也此真鉛真汞非凡砂水銀之比九莫把孤陰為有陽獨修一物轉羸尪葉士表曰此言習性於頑空不知造化者固多枯坐氣血修澀轉見羸尪矣鍾離先生曰無心兀兀坐多年將謂神仙已有緣不解龍吟並虎嘯謂之枯坐又徒然又曰有無交入名丹本隱顯相符是水金莫謂此身俱是道獨修一物是孤陰象川翁曰陽裏陰精者己之真精是也精為生氣氣能生神榮衛一身莫大於此故古人戒之曰油枯燈滅髓竭人亡此言精氣實一身之根本也奈何此物屬陰其質不剛其性好飛不受制鍊若不得混元真一之陽以制之則無由凝結以成變化鍾離先生曰涕唾精津氣血液七般物事總為陰若將此物為丹質怎得飛神貫石金勞形按引皆非道鍊氣餐霞總是狂畢世謾求鉛汞伏何時得見虎龍降大易志圖曰夫修金丹言刑殺者是也更相制伏也若無制伏則神氣不交故李筌云金丹之術百數其要在神水華池是陰一而制陽一之道華池之義也參同契曰白者金精是陽一黑者水基是陰一水者道樞其數名一是為三一金丹是也無名子曰但將白虎擒龍自有青龍制虎二氣相吞而産金丹既得此丹復將此丹擒自己之真氣戀金丹而結聖胎也內之真龍真虎既降則世外龍虎自伏內鍊神魂鬼魄既聖則世外鬼神自欽非道隆德劭孰能與於此哉勸君窮取生身處返本還元是藥王葉士表曰人受生之初在胞胎之內隨母呼吸受氣而成及乎有生剪去臍蒂一點元靈之氣聚於臍下日復一日神出氣離離其本源驅馳外務不知返本還元之道聖人指性命之根令人收神聚氣還返往來歸根復命也袁公輔曰世人妄認父母精血為本來面目生身之處非也殊不知人禀先天一氣而生須認母之母識真鉛之祖宗可矣且如稻遇六月至午時開花其中有精如一點水便是戊己一感真陽之氣隨即結秀百日成熟所以世人日食無厭者蓋稼穡作甘洪範為土能資培一身不酸不辛不苦不鹹甜淡其味加之日餐茗飲果菜之類皆一氣也既集欲散故男子自二八而真精泄女子自二七而天癸降然後有夫妻之欲一有感合則結成胎孕子在胞中隨母呼吸受氣而成十月數周胎完氣足靈光入體脫出其胞及乎剪去臍蒂一點元靈之氣聚於臍下日復一日神出氣移虧散真源離其本根終致死壞耳真人愍夫世人流浪生死沉溺愛河作為歌詩直指性命之根以勉世人其意若曰始因父母二氣無質生質既長養成大聰慧明辨豈不能自有為而之無為乎今也既解生身之處矣欲要返本還元超凡入聖非得真汞真鉛不可象川翁曰真龍真虎者二八是也真鉛真汞者二弦氣是也但學者多以旁門小徑非類之物為鉛汞故仙翁直指所産之處返此之本還此之元為藥王也十好把真鉛著意尋莫教容易度光陰葉士表曰鉛者北方正氣一點初生之真陽為藥母也太上曰以鉛為君以汞為臣鉛若不真汞亦難親故鉛為造化之主但將地魄擒朱汞自有天魂制水金袁公輔曰欲得真鉛但將地魄擒朱汞陰求陽也便見天魂制水金也乃陽求陰也可謂道高龍虎伏堪言德重鬼神欽已知永壽齊天地煩惱無由更上心葉士表曰龍虎即鉛汞也鬼神魂魄也十一黃芽白雪不難尋達者須憑德行深四象五行全藉土三元八卦豈離壬葉士表曰四象青龍白虎朱雀玄武也五行金木水火土也因坎離戊己而造化三元支干納音也八卦乾坤坎離艮震巽兊也皆不離混沌之中壬者妊也夭壬地癸會于北方故萬物妊娠於子袁公輔曰四象龍虎雀武也五行金木水火土也皆非戊己真土不能攢簇而成丹基三元夭地人也八卦乾坤坎離艮震巽兊也皆自水數一中生出故不離於混沌之中壬者妊也夭壬地癸會于北方萬物妊娠於子故金丹亦自混沌中生也無名子曰壬者水也真一之水即真一之精氣夭地之母陰陽之根水火之本日月之宗萬物之祖也鍊成靈質人難識消盡陰魔鬼莫侵欲向人間留祕訣未聞一箇是知音葉士表曰非立談之事十二草木陰陽亦兩齊若還缺一不芳菲初開緑葉陽先唱次發紅花陰後隨葉士表曰萬物負陰而抱陽缺一不可陽先陰後如鉛生汞也袁公輔曰萬物負陰而抱陽雖草木亦然缺一不可初開緑葉乃陰也却是陽先唱次發紅花乃陽也却是陰後隨常道只斯為日用真源返覆有誰知報言學道諸君子不識陰陽莫强嗤袁公輔曰道之常每在日用之間而真源返覆之理孰有知之者真人謂學道之人不識陰陽相互代謝徒嗤鄙也十三不識玄中顚倒顚爭知火裏好栽蓮參同契曰金入猛火色不奪光日受月化體不相傷此言火裏栽蓮乃陰歸陽室也無名子曰日離屬陽反是女月坎屬陰反是男此顚倒也此二物顚倒而生却以此丹點己之汞而結聖胎是謂男兒有孕猶火中栽蓮也故仙翁讀參同契曰五行逆兮丹體常靈常存言水逆而土土逆而木木逆而金金逆而火火逆而水此顚倒顚之義也牽將白虎歸家養産箇明珠似月圓葉士表曰白虎金精也採歸爐鼎之中溫養成丹陰化純陽也無名子曰修丹之法先取上弦西畔半輪月得陽金八兩次取下弦東畔半輪月得陰水半斤以此兩箇半輪月合氣而生丹故得金丹一粒似月圓也兩箇八兩合成一斤此仙翁言月圓之意比喻外丹法象也及得此丹吞入己腹中則金丹却為白虎矣又牽此白虎歸己腹中養配戊己土然後運陰符陽火循歷六十四卦鍊成金液還丹一粒亦重一斤似月圓矣此比喻內藥法象也內藥所以似月圓者蓋運火之卦一卦有六爻六十四卦計三百八十四爻象一斤重三百八十四銖也故真一子曰上下兩弦一斤之數分三百八十四銖以應火候爻之計也仙翁指似月圓之意但欲學者同明造化之㫖分內外二八之數不可一揆而論也謾守藥爐看火候葉士表曰世人三年九載鍛鍊金石覬欲點化此謾守也但看神息任天然葉士表曰天地有自然之氣氣有自然之數人禀天地而生氣數與天地等修真之士窮造化之原知升降之路但安神定息一念不生湛然無欲則神氣周流自然造化老子曰綿綿若存用之不勤羣陰剝盡丹成熟跳出凡籠壽萬年葉士表曰真一之氣陽之郭也人食五穀窒塞之不能周流造化所以一身俱屬陰也聖人能忘形養氣忘氣養神忘神養虛使坎離消長於一身風雲發泄於七竅真氣流行生産丹藥换骨回陽與天地同久也十四三五一都三箇字古今明者實然稀葉士表曰三五十五也一者言三五歸於一處也袁公輔曰三者木也為離女朱汞一者水也為坎男白金五者土也為中宫戊己之位易曰三五與一夭地精參同契曰本之但二物兮末之為三五三五並為一兮都集應二所是也關子明易傳曰陰陽三五者陽三陰二相參成五皆始生於先天一氣之中也東三南二同成五北一西方四共之戊己自居生數五三家相見結嬰兒葉士表曰木數三火數二一五也金數四水數一二五也土數五三五也三五歸一則結而成丹嬰兒言純陽也無名子曰龍屬木木數三居東木能生火故龍之弦氣屬火火數二居南二物同元故三與二合而成一五虎屬金金數四居西金能生水故虎之弦氣屬水水數一居北二物同宫故四與一合而成二五二五交於戊己中宫屬土土數五是成三五也三五合而成丹丹者一也此三者結成嬰兒實希有也嬰兒是一含真氣十月胎圓入聖基葉士表曰五行聚於此處成丹如子在胞胎數足成形也超凡入聖此為基本十五不識真鉛正祖宗萬般作用枉施功休妻謾遣陰陽隔絶粒徒教腸胃空葉士表曰休妻絶粒學道人本分事也真人之意恐人不識真鉛止以休妻絶粒為盡於道故有隔陰陽空腸胃之說如有妻亦不必休若淡然無欲則與無妻者同矣有食亦不必絶若真氣滿足自然不思飲啖矣今人動而亡上則止於尅化而已一氣何自而生成耶其間亦有謂之夫婦雙修者如劉安王許旌陽張同空劉綱者殊不知此輩聞道在有妻之後正愚所謂不必休也若果在於有妻真人安得有自然有鼎烹龍虎何必擔家戀子妻之句袁公輔曰天地未分形若雞子中混沌真一之氣即黑鉛也故真鉛為天地萬彙之先天地既分則一數生水二數生火三數生木四數生金五數生土土復生黑鉛也金丹之道始以水母為丹基即汞母也水母復生真水銀故謂之歸一還源也真一子曰金本生水故謂水之母謂金常藏形於水乃隱子胎也水為金之子謂黑鉛變質之後寄位西方為白虎金胎水復藏母胎中為水銀真汞也參同契曰金來歸性初乃得稱還丹是知真鉛者即汞之祖宗也人能識真鉛之㫖而修之即與天地齊年其他休妻絶粒咽納存想之術皆在用工夫與丹道殊異矣草木金銀皆滓質雲霞日月屬朦朧葉士表曰草木金銀皆有質之物雲霞日月乃客外之氣豈能回陽换骨耶鍾離先生曰訪山結友學燒丹精選珠琉作大還將謂外丹化內藥元來金石不相干又曰日魂月魄天地精採之得法尚非真蓋緣不是自家物所以教君謾苦辛更饒吐納並存想總與金丹事不同十六萬卷仙經話總同金丹只此是根宗依他坤位生成體種向乾家交感宫葉士表曰月出於西南坤位言藥隨太陰而生真人曰月者藥之丹是也乾陽也種於乾家以汞投鉛陰歸陽室也袁公輔曰西南坤位乃太陰所生之方太陰一月一周天太陽一歲一周天每遇朔前半夜子時運行陽火之初日月合璧於畢昴之上故一歲十二次交合生育萬物也一歲十二月分大小盡者蓋奇耦數也奇為陽耦為陰又謂消長盈虛之理日月皆循黃道而行一升一降一浮一沉日受月化體不虧傷也至三日則月感日之魂而纎魄生焉龍虎上經曰神功變成震三日月出庚則乾交坤之下爻而為震卦故至三日現於庚方此易所謂西南得朋之時也卯酉為日月出入之方金木之正位自六日至八日而成上弦龍虎上經曰坤再變成兊八日月出丁故上弦金半斤也乾交坤之中爻而為兊卦則月光得半弦平如繩而月現於丁方喻鼎中金火各半也自十一日至十五日三陽備矣圓照東方甲位謂之月望是月魄全得日魂而滿也至金水壯盛之時為乾健之體至此太陽之精盛滿神室之內金火之氣化而為汞汞與其母兩相留戀以變金體蟾蜍兔魄互相包裹光耀鼎中金氣漸榮而變成丹也陽極陰將生矣龍虎上經曰十六轉相减乾初缺成巽則坤交乾之下爻而為巽卦陽火初退陰符始生平明則現於辛方亦如陽火初進之時月生三日同也又曰乾再損成艮二十三下弦故下弦水半斤也自二十一日陰符再退至二十三日坤交乾之中爻而為艮卦則月現於丙方復與上弦同義蓋鼎中金水各半也上下兩弦相合共得一斤之數參同契曰兩弦合其精乾坤體乃成是也又自二十六日至二十八日坤交乾之上爻而為坤卦月光將盡則月現於乙方至于東北此易所謂東北喪朋之時也二十八日至三十日陰符到此消盡陰陽之氣各停土與木金和而為液太陽之氣不合於月則太陰之體全黑自此又復循環不窮矣夫月純陰也不感日之純陽烏能滅而復生人亦純陰也要得歸根復命長生久視須是依他坤體種向乾宫以汞投鉛陰歸陽室也豈非金丹根宗之㫖乎無名子曰至當歸一莫不以龍虎二八初弦之氣以為丹之質但依坤母生成之理逆而修之得丹之後種在乾父交感之宫以運符火蓋修真之要妙不出鉛火二字至哉平叔翁泄盡天機於此莫怪天機俱漏盡都緣學者盡迷蒙若人了得詩中意立見三清太上翁修真十書悟真篇卷之二十六
