front:
  text: 修真十書悟真篇卷之二十六并序李八嗟夫人身難得光景易遷罔測短修安逃業報不自及早省悟惟只甘分待終若臨岐一念有差墮三塗惡趣則動經塵劫無有出期當此之時雖悔何及故老釋以性命學開方便門教人修種以逃生死釋氏以空寂為宗若頓悟圓通則直超彼岸如其習漏未盡則尚徇於有生老氏以鍊養為真若得其要樞則立躋聖位如其未明本性則猶滯於幻形其次周易有窮理盡性至命之辭魯語有毋意必固我之說此又仲尼極臻乎性命之奧也然其言之常略而不至於詳者何也蓋欲序正人倫施仁義禮樂之教故於無為之道未嘗顯言但以命術寓諸易象性法混諸微言耳至於莊子推窮物纍逍遙之性孟子善養浩然之氣皆切幾之逮夫漢魏伯陽引易道交媾之體作參同契以明大丹之作用唐忠國師於語録首叙老莊言以顯至道之本末如此豈非教雖分三道乃歸一奈何後世黃緇之流各自專門互相非是致使三家宗要迷沒邪歧不能混一而同歸矣且今人以道門尚於修命而不知修命之法理出兩端有易遇而難成者有難遇而易成者如鍊五芽之氣服七耀之光注想按摩納清吐濁念經持呪噀水叱符叩齒集神休妻絶粒存神閉息運眉間之思補腦還精習房中之術以至服鍊金石草木之類皆易遇而難成已上諸法於修身之道率多滅裂故施力雖多而求效莫驗若勤心苦志日夕修持止可以辟病免其非橫一旦不行則前功漸棄此乃遷延歲月事必難成欲望一得永得還嬰返老變化飛升不亦難乎深可痛傷蓋近世修行之徒妄有執著不悟妙法之真却怨神仙謾語殊不知成道者皆因鍊金丹而得恐泄天機遂托數事為名其中惟閉息一法如能忘機絶慮即與二乘坐禪頗同若勤而行之可以出定出神奈何精神屬陰宅舍難固不免長用遷徙之法既未得金汞還返之道又豈能回陽换骨白日而升天哉夫鍊金液還丹者則難遇而易成要須洞曉陰陽深達造化方能超二氣於黃道會三性於元宫攢簇五行合和四象龍吟虎嘯夫倡婦隨玉鼎湯煎金爐火熾始得玄珠有象太乙歸真都來片餉工夫永保無窮逸樂至若防危慮險愼於運用抽添養正持盈要在守雌抱一自然復陽生之氣剝陰殺之形節氣既周脫胎神化名題仙籍位號其人此乃大丈夫功成名遂之時也今之學者有取鉛汞為二氣指藏府為五行分心腎為坎離以肝肺為龍虎用神氣為子母執津液為鉛汞不識浮沉寧分主客何異認他財為己物呼别姓為親兒又豈知金木相尅之幽微陰陽互用之奧妙是皆日月失道鉛汞異爐欲望結成還丹不亦遠乎僕幼親善道涉獵三教經書以至刑法書算醫卜戰陳天文地理吉凶死生之術靡不留心詳究惟金丹一法閲盡羣經及諸家歌詩論契皆云日魂月魄庚虎甲龍水銀朱砂白金黑錫坎男離女能成金液還丹終不言真鉛真汞是何物色不說火候法度溫養指歸加以後世迷徒恣其臆說將先聖典教妄行箋注乖訛萬狀不唯紊亂仙經抑亦惑誤後學僕以至人未遇口訣難逢遂至寢食不安精神疲悴雖詢求遍于海嶽請益盡於賢愚皆莫能通曉真宗開照心腑後至熙寧己酉歲因隨龍圖陸公入成都以夙志不回初誠愈恪遂感真人授金丹藥物火候之訣其言甚簡其要不繁可謂指流知源語一悟百霧開日瑩塵盡鑑明校之仙經若合符契因念世之學仙者十有八九而達真要者未聞一二僕既遇真筌安敢隱默罄所得成律詩九九八十一首號曰悟真篇內七言四韻一十六首以表二八之數絶句六十四首按周易諸卦五言一首以象太乙續添西江月一十二首以周歲律其如鼎器尊卑藥物斤兩火候進退主客後先存亡有無吉凶悔吝悉備其中矣於本源真覺之性有所未盡又作為歌頌樂府及雜言等附之卷末庶幾達本明性之道盡於此矣所期同志者覽之則見末而悟本捨妄以從真時熙寧乙卯歲旦天台張伯端平叔叙丹房寶鑑之圖
