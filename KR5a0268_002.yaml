body:
  text: 絶句上六十四首一先把乾坤為鼎器次摶烏兔藥來烹真一子曰太易太素之前含靈至妙未見萌兆太極太一之際有物混成中真一之精為天地之祖萬物之始一氣既形二儀斯析然後有乾坤陰陽五行三才萬物衆名故配乾坤為天地紀綱運陰陽為造化橐籥是以乾坤立而陰陽行乎其中矣金液大丹與造化同途故以乾坤為鼎器同其大冶以坎離為藥物比其化權餘六十卦布為火候也參同契曰乾坤者易之門户衆卦之父母坎離垣郭運轂正軸牝牡四卦以為橐籥覆昌陰陽之道猶工御者執銜轡準繩墨隨軌轍處中以制外故在於曆紀月節有五六經緯奉日使兼並為六十四卦剛柔有表裏契祕圖曰離納己為日為火為心為丹砂為龍為汞坎納戊為月為水為腎為鉛為虎為氣離卦內陽而外陰外剛而內柔赫日乃陽玄烏乃陰言陽中有陰也坎卦外陰而內陽外柔而內剛月魂乃陰兔魄乃陽言陰中有陽也然北斗經疏又云烏三足陽數也兔四足陰數也蓋三乃木之生數四乃金之生數所以配木公金母也龍汞屬木虎鉛屬金木從火出金向水生也既驅二物歸黃道爭得金丹不解生葉士表曰二物言前坎離所産之藥黃道中宫也二物既得中宫得火候養育無不成丹也二安爐立鼎法乾坤鍛鍊精華制魄魂葉士表曰混沌未判乾坤一六位乎上下坎離十五位乎兩間太極既分象亦如此故丹道法天地造化以乾坤鼎器鍛制日月也聚散氤氲為變化敢將玄妙等間論葉士表曰真氣熏蒸往來升降或聚或散不可名狀三休泥丹竈費工夫鍊藥須尋偃月爐自有天然真火用不須柴炭及吹噓葉士表曰兩腎狀如偃月中混元丹鼎為造化之根有天然真陽之火生産丹藥無名子曰葉文叔指兩腎為偃月誤矣蓋此爐之口偃仰開如偃月之狀即陰海是也此中有自然真火不須柴炭吹噓之勞袁公輔曰憑丹竈以燒金鍊銀破耗資財積纍成月萬無一成金丹之法當以偃月為爐用天然真火烹鍊然後可成參同契曰偃月法爐鼎白虎為熬樞是也人之中宫取象太陰之魄茍能領攬真陽之氣於內則亦如太陰生魄漸變乾陽之體生産丹藥也四偃月爐中玉蘂生朱砂鼎內水銀平只因火力調和後種得黃芽漸長成葉士表曰玉蘂藥之初生者朱砂鼎言水銀從其中而出用火調養則凝結成質袁公輔曰玉蘂初生自日汞和平而致又因火候調和所以漸長養黃芽也外藥還如內藥真有㫖哉無名子曰偃月爐陰爐也中有玉蘂之陽氣即虎之弦氣也朱砂鼎陽鼎也中有水銀之陰氣即龍之弦氣也金丹即此二火之氣調停和合之後種得真一之氣在黃家漸漸抽芽結成黍粒矣五咽津納氣是人行有藥方能造化生鼎內若無真種子猶將水火煮空鐺葉士表曰真種子中宫金母也有母然後繁生真汞造化成丹參同契曰植禾當以粟覆雞用其子又曰枝莖花葉果實垂布正其根株不失其素六調和鉛汞要成丹大小無傷兩國全葉士表曰陽汞陰鉛陽尊陰卑故有大小兩國之喻聖人恐修丹之士有大過不及之患偏陰偏陽之失故及此也若問真鉛是何物蟾光終日照西川真人曰西者金之方月者藥之用道光襌師曰蟾光終日照昏衢漏月黃芽無數七未鍊還丹莫入山山中內外盡非鉛此般至寶家家有自是愚人識不全葉士表曰鉛身中之物非山林可求識此然後入山為之也參同契曰委附去害依托丘山循游寥廓與鬼為鄰王道曰凡修金液神丹先須認藥物根源次驗其火候進退陽升陰降不離子午之方日往月來必在卯酉之位用坎離而行水火使龍虎變作夫妻還日精於月窟則鉛內産砂戲朱雀於離宫則砂中生汞情性相抱夫妻相眷自然而成金液也故人之情性不離於身丹之砂汞俱生鉛內情性於人非外物也砂汞於鉛非雜類也故大丹之道全在陰陽二氣相須而成至藥丹砂訣云鍊神者合於至道是知金丹不用金銀土石草木灰霜而造也八竹破須將竹補宜覆雛當用子為之萬般非類徒勞力爭似真鉛合聖機葉士表曰凡外藥如他財别姓非若自己真鉛氣類相投也參同契曰欲作服食仙當以同類者類同者相從事乖不成寶袁公輔曰竹非竹不可補雞非卵不可抱人之氣血衰耗鼎爐破敗非天地真鉛之氣不可補也九用鉛不得用凡鉛用了真鉛也棄捐此是用鉛真妙訣用鉛不用是誠言古歌曰鉛為芽母芽為鉛子既得金花捨鉛不使蓋鉛是中宫金母繁生真汞汞結為丹鉛則不用如萬物之種子也無名子曰真鉛即真一之氣也夫人元陽真氣逐日走散無由凝結而成聖胎故聖人鍊真鉛以制之使凝結成砂逐日運火漸漸添汞汞漸多鉛氣漸散故抽鉛添汞也十月功足鉛盡汞乾化為金液還丹則形化為純陽矣故曰用了真鉛也棄捐用鉛不用之語豈有虛言哉十虛心實腹義俱深只為虛心要識心莫若鍊鉛先實腹且教守取滿堂金葉士表曰虛其心實其腹虛心養氣實腹養丹袁公輔曰鍊汞當先鍊鉛鍊鉛先實其腹則汞自生老子曰虛實相通是謂大同世人往往實心虛腹與此背馳是致死壞耳無名子曰虛心則無我萬物皆空清其天若也實腹則鍊鉛乾汞無搖其精精者汞也守汞以實其腹則金玉滿堂矣一者丹也抱一以空其心心空則塵不立方其實也鍊鉛以制之汞乾形化于以抱一以空其心心空神妙與道合真修丹之士未鍊鉛金母搖汝精精少則還丹不成矣十一夢謁西華到九天真人授我指玄篇其中簡易無多語只是教人鍊汞鉛袁公輔曰此一篇即高象先歌意更不復注十二道自虛無生一氣便從一氣産陰陽陰陽再合生三體三體重生萬物昌葉士表曰虛無生一氣一氣生陰陽陰陽交萬物萬物生生無窮如人混元神室之中一點真精為母升降二氣二氣交合生藥藥之相生也袁公輔曰真鉛居混沌杳冥之先始生一氣一氣生兩儀兩儀生三才三才生萬物萬物生生無窮也十三坎電烹轟金水方火發崑崙陰與陽二物若還和合了自然丹熟遍身香葉士表曰金水之方中宫也火發崑崙燒山符子也陰與陽合生産丹藥其味香美袁公輔曰坎電烹轟陰中之陽也火發崑崙陽中之陰也二物皆已聚合於中宫金水之位藥熟之後自然香透肌骨也高象先曰絳宫蒸入肌膚紅何止遍身香而已哉無名子曰坎電者水中之火謂之陰火即虎之弦氣也金水方者西北乾方即龍是也西北又是天門謂之玄門此虎以陰中之火烹鍊乾龍龍即發崑崙之火以應之二物之火相併和合了則真一之精自然凝結即時採取服之則百骸俱理而香矣既餌丹後復運陰陽符火虎以陰中之火爍此玄門也龍即發崑崙之火以應之一物合和了則金液還丹自然成熟滿身增輝而香美矣此詠內外二象也十四離坎若還無戊己雖含四象不成丹只緣彼此懷真土遂使金丹有返還葉士表曰離為火火從木生坎為水水自金出坎離雖含四象不得戊己中氣往來升降終不能生産神丹矣參同契曰坎戊月精離己日光蓋坎離納戊己也袁公輔曰坎藏六戊為月之精雄陽之位居於北方月陰也戊陽也乃陰中之陽象水中之生金虎也離藏六己為日之光雌陰之位居於南方日陽也己陰也乃陽中之陰象火中之生汞龍也參同契曰坎戊月精離己日光龍虎上經曰坎雄金精離雌火光是也日月若無戊己中氣往來升降雖含四象之氣不能生産神丹明照宇宙人能會返還之理使戊己正位召集三光五行之氣生産丹藥亦能長生久視矣無名子曰離己日光坎戊月精故離之己象龍之弦氣也坎之戊象虎之弦氣也龍虎懷戊己之真土是以龍虎交而戊己合為一體四象會而丹成也故曰返還十五日居離位翻為女坎配蟾宫却是男不會箇中顚倒意休將管見事高談葉士表曰離為日中有畢月烏外陽而內陰也坎為月中有房日兔外陰而內陽也故離納己坎納戊袁公輔曰日中有畢月為陽中有陰也月中有房日兔陰中有陽也萬物生于天地間類皆如此茍或不然終不能造化生成學道之士不能會此中顚倒之意區區恃頰舌之辭者甚無謂也十六取將坎位中心實點化離宫腹裏陰從此變成乾健體潜藏飛躍盡由心袁公輔曰坎交離之中爻則成乾卦坎為月離為日參同契曰日受月化也而乾龍變化潜藏飛躍皆自中爻則人之變化超凡亦由真土也無名子曰離外陽而內陰坎外陰而內陽以內陽點內陰即成乾卦喻如金丹是至陽之氣號曰陽丹結在陰海之中取來點己之陰汞即化為純陽之身然後運火抽添進退皆由我心之運用也十七震龍汞自出離鄉兊虎鉛生在坎方二物總因兒産母五行全要入中央葉士表曰離火生木汞坎水生金鉛母隱子胎也不得中宫不能攢簇袁公輔曰木本生火為母金本生水為母今震龍却出於離兌虎却出於坎者乃母隱子胎也二物總因兩相慕戀顚倒而得若又非五行之氣攢簇於中宫亦不能成無名子曰汞為震龍屬木木為火母火為木子此常道之順五行也然朱砂屬火為離汞自砂中生却是火反生木故曰兒産母此五行之顚倒術也鉛為兊虎屬金金為水母水為金子此常道之順五行也然黑鉛屬水為坎銀自鉛中生却是水反生金故曰兒産母此亦五行之顚倒術也不言銀者鉛中銀謂之真鉛中央下丹田大中極也十八赤龍黑虎各西東四象交加戊己中復姤自兹能運用金丹誰道不成功葉士表曰赤龍黑虎雖有東西之名皆本於戊己中氣也能以子午爻符升降運用無不成功也王道注龍虎上經曰日有三照月有三移日月出於東而光耀於西則西方白虎金德之正氣入於玄冥之內化而為六戊日月之於西而光耀於東則東方青龍木德之正氣入於玄冥之內化而為六己日月當於午而光耀於北則南方朱雀火德之正氣入於玄冥之內就土成形化為黑鉛常居天地杳冥之先為天地萬彙之根本參同契曰日潜道而沉彩月施德以舒光日受月化體不虧傷修丹之士茍能明復姤爻符升降運用則金丹無不成之理也無名子曰四象交加戊己中而結真一之精得此真精一粒服餌之後却運火始自復卦子時起首進陽火至午時姤卦進陰符復姤是陰陽首卦即冬夏二節之至也陰符陽火自此起首抽添運用一一依法不令差殊孰謂金丹之事不成耶十九西山白虎正猖狂東海青龍不可當兩獸捉來令死鬥鍊成一塊紫金霜葉士表曰鉛象金水虎者沉而在下者也汞象木火龍者浮而在上者也二物相擒制伏則化為紫金丹藥也兩獸者龍虎也二十華嶽山頭雄虎嘯扶桑海底牝龍吟葉士表曰華嶽西方也扶桑東方也虎龍各自其所生之鄉而動也袁公輔曰華嶽雄虎陰中陽也扶桑牝龍陽中陰也參同契曰坎離精光陽戊陰己兩土合圭黃道通理黃婆自解相媒合遣作夫妻共一心葉士表曰黃婆戊己也能使龍虎配合而為夫妻也古文龍虎經曰土居宫中籠罩四方三光合度以至太平二十一月才天際半輪明早有龍吟虎嘯聲袁公輔曰月至上弦金水各半為陰陽兩停之時其中已龍吟虎嘯也便好用心修二八一時辰內管丹成袁公輔曰既言上弦又須待下弦方合二八一斤之數參同契曰上弦兊數八下弦數亦八兩弦合其精乾坤體乃成便宜則而修之金丹之妙不在三年九載之遙於一時之內便見玄珠形兆矣是宜古仙上聖促於一時之間者此之謂也無名子曰月之半輪者一八之數也仙翁指示龍虎皆一八之數合成二八也此時水源至清有氣無質也一年之中止有一日一日之中止有一時一時之中分為六候下工不出兩候立得金丹一粒服餌餘四候别有妙用此皆天機仙翁不敢成文漏露但寓意在篇中混而言之曰一時辰內管丹成二十先且觀天明五賊次須察地以安民民安國富方求戰戰罷方能見聖君陰符經曰觀天之道執天之行盡矣天有五賊見之者昌五賊者在天為五星在人為五行謂之賊者隱顯莫測也若能明此五者可以奪天地造化之妙土地者自己也民者身中之神也神安則氣血和平然後行功進火以戰陰鬼陰鬼退則我身帝王無為安逸也參同契曰帝王永御千秋常存無名子曰國者身也民者精氣也民為邦本本固邦寧邦茍無君則民何歸君茍無臣則國罔治是以聖人以丹為君以火為臣丹火相須君臣慶會則天下平治精民安樂則一身之國富矣二十三用將須分左右軍饒他為主我為賓大凡臨陳休輕敵恐喪吾家無價珍葉士表曰此論物二交感如用將分其左右主客以真鉛為主於內運離汞自外而入也老子曰禍莫大於輕敵輕敵則喪吾家之寶此言運火抽添不可不愼也袁公輔曰此一章真人以用將主賓為戒為喻將之用兵茍不分為行陳則紛亂無統紀分一軍為左右者然後可以教陳而取勝本以陰陽二者為喻不復更為五軍之文茍兩軍不一必致敗衄矣客之見主當容貌端莊進止恭肅故能致主人之尊禮若舉措倉惶語言錯雜則必為所鄙矣運火亦然從其在彼者為主我為賓客但符火不失其節陰陽不致於偏安神定息一念不起綿綿若存用之不勤而已又奚致於喪失耶無名子曰此篇明火候作用也將者火也左為文火右為武火夫運火自子至巳六辰為陽象春夏發生之德故文火居左謂之陽火自午至亥六辰為陰象秋冬肅殺之刑故武火居右謂之陰符火主為陽而雄好爭賓為陰而雌好靜饒他為主我為賓即是守雌而不雄持靜而不爭此慮險防危之意也喻如賓之見主進退恭謹而不敢妄動也夫運火者先定刻漏以分子午次接陰陽以為化基般六十四卦於陰氣於陽火天關在手地軸形心曰七十二候之要津攢歸鼎內奪三千六百之正氣輻凑胎中謹戒抽添精專運用慮其危防其險不使頃刻參差分毫差忒故得外接陰陽之符內生真一之體茍或運心不謹節候差殊即姹女逃亡靈胎不結而還丹無價之寶失矣二十四木生於火本藏鋒不會鑽研莫强攻禍發只因斯害己要須制伏覓金翁葉士表曰此言自鉛取汞也汞藏鉛中不見其形如火生於木不見其明也若不得抽添之法莫强攻取恐有害也蓋禍患之發緣火候不愼要須得金母在內然後汞見鉛伏若無其主汞復何求袁公輔曰木中生火蓋木得火而旺為木之精魂本以藏其鋭不欲發見於外茍有所動則反為木之所焚矣陰符經曰火生於木禍發必尅奸生於國時動必潰知之修鍊謂之聖人欲得木之鎮靜須假金以伐之參同契曰金伐木榮是也二十五金翁本是東家子送向西鄰寄體生葉士表曰金翁鉛也鉛乃白金之母始因汞凝結而成故曰東家子也以五行言之金受胎於卯西鄰者月三日生魄於西方也無名子曰青龍白虎俱是真一之精變為二物分位東西實同出而異名也真一精屬汞汞為龍在東白虎本是真一精之子寄體西方也認得唤來歸舍養配將姹女作親情葉士表曰知鉛因汞所産藏於中宫復運靈汞入而配合也二十六姹女游從自有方前行須短退須長葉士表曰此言真汞隨太陰而生自有方位須索也短陰爻也長陽爻也午前索陰而為陽午後索陽而為陰如坤化為復乾化為姤之類是也袁公輔曰姹女木汞也而與之游從者乃太陰言汞隨太陰而生自有方位自三日月現庚方至上弦初八只居于五六日之間豈非前行須短乎復自十五至二十三下弦却乃在八九日之後豈非退行須長乎前而短退而長陽而陰陰而陽如此方能生生不窮真人種種開說只是論一中字無名子曰姹女汞也謂之汞火游從有方者前行是外藥作用一時中用兩候故云須短後行是內藥作用一時中用四候故云須長有此兩用故曰自有方聖人下工鍊金丹之初運汞火不出半箇時辰立得真一之精大如黍米者吞服故曰前行須短也及乎服丹之後又運己汞火却有十月之功故曰後須長也歸來却入黃婆舍嫁箇金翁作老郎葉士表曰靈汞游從上下歸於中宫與鉛配合亦結為鉛袁公輔曰一月數終復歸于坤嫁箇金翁者言陰汞又來隨陽鉛生沒循環無窮也王道云開闢已來循環無端可謂老郎矣二十七縱識朱砂及黑鉛不知火候也如間大都全藉維持力毫髮差殊不作丹葉士表曰雖知朱砂産汞黑鉛生銀不知火候亦不能生成造化蓋元精者鼎中神靈真精天地之氣視之不見摶之不得而能潜隨化機生成萬物既杳冥之難測必立符證以則之倘或汞鉛不定分兩違則剛柔亢行不相投入則丹不成矣故真一子曰或陽火過刻水旱不調則凝冬變為大暑或陰符失節寒暖相侵則盛夏反為濃霜金宫既砂汞之不萌一鼎則蟲螟互起大則山崩地圮金虎與木龍沸騰小則雨暴風飄坎男共離女奔逸以此觀之縱識鉛汞二物不曉火候亦徒然耳王道曰金液神丹全在火候火是藥之父母藥是火之子孫魏師吕曰夫能盡性命之道者無出於黃帝金丹金丹之妙在乎火記火記之妙象乎坎離相交而生變化神明也是知鉛汞非火候不能成丹明矣昔崔翁授吕真人以天元入藥鏡是必令究其火功學者當宜盡心二十八契論經歌講至真不將火候著於文要知口訣通玄處須共神仙子細論道光襌師曰聖人傳藥不傳火從來火候少人知莫將大道為兒戲須共神仙子細推是知火候非遇至人口傳心授不可曉會無名子曰火記六百篇篇篇相似出入貫穿與天合度天之所祕聖莫傳之遭遇尊師勿自鹵莽二十九八月十五玩蟾輝正是金精壯盛時若到一陽來起復便堪進火莫延遲葉士表曰太陰月月圓滿惟八月十五最明者太陰極也月為金金旺於酉陰極陽生故久進火也象日中亥末子初之時世人以八月十五取圭丹者非也袁公輔曰丹為金金旺於酉故至八月十五乃金水旺盛之時為最明也天下之理盛必有衰陽必有陰至十月坤卦陰符將盡緣陰無可絶之理陽將生焉冬至起復卦故又進火循環接一年之候也丹道亦然若能凖乾坤陰陽相代之理修之無不成者亥上見六乃十月老陰之位陰氣至此方極六者陰數也且乾坤為陰陽造化之主故七日來復也建子之月天輪左轉地軸右旋一氣交感生於萬物明年冬至各反其本故二氣言之則是陽進而陰退也夏至陽氣復於巳冬至陰氣復於亥故謂之反本三十一陽才動作丹時鉛鼎溫溫照幌帷受氣之初容易識抽添運用且防危葉士表曰日中冬至乃夜半子時也真鉛鼎室之中陽氣隨陽而長溫溫然如燈光透於帷幌之間也受氣之初者言其所禀也如金胎於卯木胎於酉火胎於子水土胎於午此雖易知其抽添運用不可不愼也袁公輔曰此言下手工夫也受氣之初其得甚易而抽添運用有安有危不可不愼也參同契曰立表以為範占候定吉凶發號順時令勿失爻動時無名子曰一陽子時造丹鼎內真鉛被火鍛鍊光透簾幃一時中得之甚易及乎在內却有十月之功運用抽添防危度險也三十一玄珠有象逐陽生陽極陰消漸剝形十月霜飛丹始熟恁時神鬼也須驚葉士表曰玄珠者汞也隨陽氣而生如月假日而明也陽盛則陰氣剝滅十月者言丹藥在鼎如子在胞待其數足熟則體化純陽鬼神驚伏參同契曰類如雞子黑白相扶縱橫一寸以為始初四支五臟筋骨乃相涉歷十月脫出其胞三十二前弦之後後弦前藥味平平氣象全採得歸來爐裏鍛鍛成溫養似烹鮮葉士表曰前弦之後後弦之前桂魄澄滿之時也當此時藥氣平和氣象全足下工採鍊而後溫養烹鮮者言如治小魚也進火不可有太過不及之患亦不可撓之當任其自然而熟老子曰治大國若烹小鮮是也袁公輔曰前弦之後後弦之前乃十五也此時桂魄澄滿氣象全足若人能依法太陰自立神鼎修鍊一體無異也蓋太陰自坤變震兊而至乾陽亦是溫養而來自柔至剛也進火之法如煮小魚相似茍或火盛則太剛而易炊火緩則太柔而不能熟溫養者火力有節也無名子曰初八日二陽生名兊卦此時魄中魂半其平如繩故曰上弦前屬陽其後屬陰陰中半陽得水中之金八兩其味平平其氣象全至十五日三陽以備象乾卦此時陰魄之水消盡陽魂之金盈輪是以團圓純陽無陰故曰望也夫陽極則生陰故十六日純陽輪中生一陰象巽卦漸漸缺至二十三日二陰生象艮卦此時魂中魄半其平如繩故曰下弦此弦之前屬陰其後屬陽陽中陰半得金中之水半斤其味平平其氣象全故聖人喻此二八歸造化爐中烹鍛真一之氣變成一粒吞歸五內又别運既望之火烹煎而成金液還丹也修真十書悟真篇卷之二十七
