  text: 修真十書悟真篇卷之二十八奈一
  hash: sha256:57e9882fb7f3817f78a3cb532f7fff6403119565d8c7277b18f8d73f141cca6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0268_HFL_003-001a, image: hfl/0127/0127-004.png}
body:
  text: 絶句下三十三長男乍飲西方水少女初開北地花若使青娥相見後一時關鎖住黃家葉士表曰此論火候也震為長男兊為少女巽為長女屬木曰青娥艮坤屬土為黃家也言震一變為兊神水生也兊一變為乾金花凝也乾一變為巽自巽一陰生其藥皆含護於中宫也參同契曰三日震動八日兊行三五德就乾體乃成巽繼其統固濟採時艮生進止不得喻時六五坤承清恬終始輕春衆子世為類母袁公輔曰長男震卯也為太陽少女兊酉也為太陰乍與初皆始也太陽自初一日入酉初三日太陰便生纖魄北地花者乃自陰而生陽也震一變為兊二變為乾兊乾皆屬金故三日為金花初開青娥木汞也至十五圓照甲方若太陰與甲相見之後自此從乾變巽復歸坤位也真人以此喻鼎中當金水壯盛之時正陰陽兩停之際便宜則而象之關防羅網使真汞無所逃遺一時之內可立就也正如上文云便好用工修二八一時辰內管丹成三十四兔雞之月及其時刑德臨門藥象之到此金砂須沐浴若還加火必傾危葉士表曰卯酉二八門日月出沒之所卯為刑刑主殺蓋四陽之位陰不勝陽陰道將離故陽道隨陰而落象金砂落在胞中也酉為德二主生蓋四陰之位陽不勝陰陽道將離故陰氣隨陽而落象金水滋液於鼎內故參同契曰二月榆死八月麥生當此之時住火忽符也袁公輔曰日月至卯酉二月正刑德臨門之時卯酉為日月出入之門謂至本位也豈非及時乎日主刑殺月主德生二月榆死陽中有陰八月麥生陰中有陽故太陰之魄象之謂上下兩弦金水氣停到此金砂陰汞居三陰三陽之際故沐浴也如人休沐火主動倘有所動必致傾危矣無名子曰兔二月為德雞八月為刑此兩月號為沐浴當罷火若進加火必反致傾危矣魏真人鼎器歌曰首尾武中間文言火候首尾也當晦朔用武火中間當月望金水逾盈之際須防變護失故用文火也三十五日月三旬一遇逢以時易日法神功葉士表曰一年有三百六十日一月有三百六十時真人以時易日法天地之神功也日月一月一交會此則一日一交會也蓋神也者不疾而速不行而至無名子曰太陰太陽一日一次相交聖人則之故移一月之候在一日之中又移一日之候分在一時辰之內般運符火守城則沐浴罷功野戰則龍虎交合抽添進退知吉知凶慮險防危無忽無怠故得靈砂凝結也守城野戰知凶吉增和靈砂滿鼎紅葉士表曰守城者退火守藥也野戰者進火採藥也修丹之士能審察進退知其吉凶則丹氣不耗日盛一日也袁公輔曰守城者靜也野戰者動也故吉凶常存於動靜之間運符火之士能知吉凶動靜之理則鼎內靈砂安得不成丹哉無名子曰苟或陰陽錯亂日月垂戾外火雖動而行內符閉息不應有道之士進火退火知吉知凶旋斗歷箕暗合天度自然靈胎密運神鼎增輝三十六否泰才交萬物盈屯蒙二卦受生成箇中得意休求象若究羣爻謾役情葉士表曰否泰陰陽等也屯蒙六十卦符火之首也朝屯暮蒙日用兩卦兩卦計十二爻以應十二時舉一以為例也當陰陽兩平之時真氣盈滿屯蒙二卦生成藥物聖人以卦符為則不泥乎爻象也袁公輔曰天地之氣一交則萬物豐盈屯蒙為六十卦符火之首屯蒙受卦便禀生成真一子曰立創鼎器運動天機初則全無形質一如鴻濛之中既經起火運符便應元年滋産日居月諸龍虎體就是也苟於此中得其幽玄不必泥易求象索爻徒勞神思耳無名子曰陽氣到天地之中陰陽相半不寒不熱而溫故為泰卦亦如月之上弦氣候也此時陰陽二氣自然相合故聖人於此不進火候謂之沐浴至陰降天地之中陰陽相半不熱不寒而凉故為否卦亦如月之下弦氣候也此時陰陽二氣自然相交聖人不進火候亦謂之沐浴也若能於屯蒙否泰四卦中得意何必究羣爻而勞心役思哉三十七卦中設象本儀形得象忘言意自明後世迷徒惟泥象却行卦氣望飛升葉士表曰聖人立卦設象顯造化萬物之理學者得象忘言可也鍾離先生詩曰大道安能以語通伯陽假易作參同後人不識神仙喻執著筌蹄便下功袁公輔曰聖人作易畫卦設三百八十四爻顯造化萬物之理學者得象忘言可矣茍迷執爻象望卦以飛升不亦遠乎三十八天地盈虛自有時審觀消息始知機由來庚甲申明令殺盡三尸道可期葉士表曰盈與息陰化為陽也虛與消陽化為陰也二者各有其時人能審觀消息盈虛之理始知造化之機矣庚甲者三日月出於庚子五月滿於甲當此之時採藥進火如人君申明號令以殺伐陰鬼真道可期也無名子曰純陰坤卦凉變為寒曰冬萬物收藏之時故曰虛也天地盈虛因月而見月從日生初三日震庚生形初八日兊丁上弦十五日乾甲圓滿天地盈之時也十六日巽辛受統二十三日艮丙下弦三十日坤乙消滅天地虧之時也三十九要得谷神長不死須憑玄牝立根基葉士表曰人抱真一之氣如谷函至虛之神雖曰無形扣之則應若欲真氣不絶當以玄牝為根基也玄牝者陰陽門户天地之根也真精既返黃金室一顆靈光永不離葉士表曰玄牝之宫即中宫也中藏真一之氣生金精也真氣生産金精復還其室則靈光不離於己靈光神也積精生神世人泄之於外所以精竭人亡也無名子曰金精乃華池中神水之真金也又名金胎神室乃丹田混元宫中有真一之精在天為天一之水四十玄牝之門世罕知休將口鼻妄施為饒君吐納經千載爭得金烏搦兔兒葉士表曰此一篇論根蒂也老子曰谷神不死是謂玄牝玄牝之門是謂天地根世人見門一字遂尋其穴有以口鼻為之有以舌下兩竅為之有以兩腠為之有以男女為之蓋門者出入之謂也人原父母一點精氣先結為丹元然後生五臟六腑兩腎中間混元一穴是也真氣從此而出及其生藥又流入於此龍虎上經曰徑寸之質以混三才參同契曰縱橫一寸以為始初袁公輔曰玄牝之門者日月出入之門也世罕有知者若能知之則會合陰陽不為難耳無名子曰玄牝之門為天地根葉文叔誤指為兩腎中間混元一穴殊不知玄牝二物若無此二物安能有萬物哉故內外二丹從此而出聖人祕之號曰偃月爐懸胎鼎是也金烏金丹也金丹制己汞如猫摶鼠如鷹搦兔不能逃走矣四十一異名同出少人知兩者玄玄是要機保命全形明損益紫金丹藥最靈奇葉士表曰老子云此兩者同出而異名蓋論大道有無之體有人借此以論鉛汞二物鉛生汞汞生鉛是異名而同出也可以保命可以全形人當明其損益也不明者泄之於外故有所損明者寶於內故有所益四十二始之有作無人見及至無為衆始知但見無為為要道豈知有作是根基葉士表曰有作者推排符火烹鍊丹藥無為者形神俱妙與道合真袁公輔曰始之有作者推排符火烹鍊丹藥豈人之所見者及至於無為之地謂形神俱妙與道合真也衆始知駭也但見無為為道之要妙豈知有作實道之根基也歟四十三黑中有白為丹母雄裏藏雌是聖胎葉士表曰黑中有白鉛內産銀鉛為丹之母也雄裏藏雌砂中有汞汞為胎中之子也袁公輔曰黑中有白陰中陽也雄裏藏雌陽中陰也只此便是丹母聖胎可以養育生成老子云知其雄守其雌為天下溪常德不離復歸於嬰兒知其白守其黑為天下式常德不忒復歸於無極是也無名子曰腎色黑故象黑鉛鉛中産銀心色赤故象丹砂砂中有汞太一在爐冝守愼三田聚寶應三台葉士表曰太含真之氣也守而愼之恐走失也上田泥丸中田絳宫下田丹室積聚其藥三田充滿如天有三台之星也袁公輔曰太一在爐者如天地鴻濛之初又如子在母胞相似庶幾可以愼守不致走失三田寶聚言兩土合圭而化真金如北斗之有三台星也四十四恍惚之中尋有象杳冥之內覓真精有無從此自相入未見如何想得成葉士表曰老子云恍兮惚其中有物杳兮冥其中有精恍惚陽之體杳冥陰之體言二者生産丹藥非存想所能成也有者坎之中爻無者離之中爻取將坎位中心實點化離宫腹裏陰此有無相入也四十五四象會時玄體就五行全處紫金明脫胎入口通身聖無限龍神盡失驚葉士表曰脫胎入口者數足成丹飛上天谷降落口中也袁公輔曰四象五行之氣全聚則玄體就而紫金明真一子以謂火運四時五行之氣以資奉神胎是也脫胎者謂跡歷十月脫出其胞也入口者如吕真人云當時自飲刀圭之類身通聖者形神俱妙與道合真也當此之時龍神豈不驚伏耶四十六華池飲罷月凝輝跨箇金龍訪紫微葉士表曰華池混元丹鼎也藥本太陰之氣聚於丹鼎如月之凝輝也跨箇金龍言脫胎神化飛升而朝紫微也從此衆仙相識後海潮陵谷任遷移葉士表曰此言通身聖也四十七要知金液還丹法須向家園下種栽不假吹噓并著力自然丹熟脫真胎葉士表曰家園自己也先得真鉛藥母為種於內然後用天地自然之數生産靈汞結成真胎也袁公輔曰金液還丹非丹竈外藥可成蓋自己也吕真人曰七返還丹在人先須鍊己待時是也須得真鉛藥母為種於內然後用天然真火烹鍊生産靈汞結成真胎也四十八徒施巧僞為功力認取他家不死方壺內旋添留命酒鼎中收取返魂漿葉士表曰此藥可以返人之魂留人之命也袁公輔曰謾施姦巧詐僞之術法丹道愈遠而有真不死之方須細認也酒與漿乃鼎中之金水可以返魂奪命也四十九雪山一味好醍醐傾人東陽造化爐若過崑崙西北去張騫方得見麻姑葉士表曰白色言其色醍醐言其味自泥丸降而傾入陽爐之中造化也若過自崑崙然後匹配如古張騫乘槎自黃河逆上至天河女宿之度矣西北天門也袁公輔曰此言西方金水投東方木火陰取陽也若復自乾坎西北而去則陽後見陰也本是金生水木生火如三五一生成之數聚集於中宫戊己之位便是今如此論者正合逆為丹用之㫖五十不識陽精及主賓知他那箇是疏親房中空閉尾閭穴悮殺閻浮多少人葉士表曰陽精太陽流珠也主賔鉛汞也疏者可去親者可學也學道者既不識陽精及為主為賓者又奚知何者可疏何者可親哉及有流入於三峰御女之術傳習不絶往往至死而不悟邪正烏可不辨邪鍾離先生曰修真不識祖來根錯用身心向外尋堪歎三峰黃谷子浮生悮殺幾多人無名子曰陽精是真一之精至陽之氣號曰陽丹己之真氣屬陰為一身之主以養百骸及陽丹自外來以制己之陰汞即是陽丹反為主而己汞反為賓矣二物相戀結為金砂自然不飛不走然後加火鍛成金液還丹也故陽丹在外謂之踈己之陰氣在內謂之親反此親踈以定賔主即道成矣五十一萬物藝藝各返根返根復命即長存知常返本人難會妄作招凶衆所聞袁公輔曰萬物之滋茂與夫草木之生植未有不返其根者茍或不然何以能凋發榮枯乎人能返本還元即長存矣葉文叔曰常者自然也老子曰不能常妄作凶五十二歐冶親傳鑄劍方莫耶金水配柔剛鍊成便會知人意萬里誅妖一電光葉士表曰歐治合和金水配合柔剛鑄成寶劍真人喻修丹之士亦以金水合和也丹成逆知未來邪不能近也袁公輔曰右一章真人以歐冶鑄劍為喻豫之鑄劍也合和金水配匹柔剛鍊成堅利飛以物莫不吹毛斷鐵修丹亦以金水和合成逆知未來飛騰變化無不如意故能蕩妖氛雖千里之遙如一電光之頃也五十三敲竹唤龜吞玉芝鼓琴招鳳飲刀圭近來體金光現不與常人話此規葉士表曰敲竹息氣也黑龜水也鼓琴運兩弦也赤鳳火也息一氣起水以吞玉芝運兩弦起火以飲刀圭丹成則金光透體此法難與常人說也玉芝即玉液也刀圭者二土為圭即坎離之戊己刀者言二物皆為金耳無名子曰敲竹乃兩物相擊之義鼓琴乃正音聲詩和之義龍之弦氣曰玉芝虎之弦氣曰刀圭此言龍虎相交擊而結為夫婦如琴瑟之諧和也鳳者南方朱雀也龍虎二物相交鍊成金丹即時採取餌歸丹田制以陰汞然後虛心運火忘情諧和運陰陽合乎呼吸以呼吸用神氣以神氣取水火以水火鍊胎息胎息綿綿游泳坎離坎離交媾而生金液也凡運火之際忽覺夾脊真氣上沖泥丸瀝瀝然有聲從頭似有物觸上腦須臾如雞卵顆顆自腭下重樓如汞酥香甜甘美之味無比覺有此狀乃得金液還丹徐徐咽歸丹田常常不絶五臟清虛閉目內觀臟腑歷歷如照燭然以有萬道金光出體盤旋罩身也五十四藥逢氣類方成象道合希夷即自然一粒金丹吞入腹始知我命不由天袁公輔曰月因日以能明故道自希夷中得之五十五赫赤金丹一日成古仙垂語實堪聽若言九載三年者盡是推延款日程真一子曰日服一粒狀如黍米則知一日有一日之丹也譬如今人服藥但久而見功也袁公輔曰金丹之道茍傳得其真識虎龍之交媾曉火候之抽添二物俱備分毫不差則一日之內便致赫然故彭真人云一日可以奪四千二百二十年天地正氣此古仙實語審詳不誑若真信旁門之術雖積纍歲月終不能成也無名子曰金丹大藥下工不逾半箇時辰立心服餌而此言一日者促一年氣候於一日之中也復以一日作用移在一箇時辰之內故通言一日也五十六大藥修之有易難也知由我亦由天若非積行施功德動有群魔作障緣葉士表曰易者言事之在難難者言成之在天古之神仙必有大施功德然後可成也五十七三才相盜食其時此是神仙道德機萬化既安諸慮息百骸俱理證無為陰符經曰天地萬物之盜萬物天之盜人萬物之盜三盜既宜三才既變故曰食其時百骸理動其機萬化安五十八陰符寶字逾三百道德靈文止五千今古上仙無限數盡於此處達真詮袁公輔曰陰符道理乃黃老所撰傳留後世其玄奧細微之㫖備寫於中自時厥後超凡達聖奚皆不出於陰符道德之㫖也五十九饒君聰慧過顏閔不遇師傳莫强猜只為丹經無口訣教君何處結靈胎袁公輔曰千經萬論止載修丹事理至於下手結交火候幽微非遇師親授縱才過顏閔則不可曉平叔既序云藥物火候細微無不悉備好事者尋文辭義豈須區區口授今反此而言者欲人之不敢輕議也六十了了心猿方寸機三千功行與天齊自然有鼎烹龍虎何必擔家戀子妻袁公輔曰神室者聰明之符為丹之樞轄縱廣一寸為一身之主喻之為猿者蓋跳躍難馴之物修丹之士已能調伏潜符天地混沌之理又須待功行滿足方能沖舉壽與天齊也今人不知自己之內有混元丹鼎可以烹鍊真鉛真汞而擔戀妻兒汩沒嗜欲可哀也哉六十一未鍊還丹須急鍊鍊了還須知止足若也持盈未已心不免一朝遭殆辱袁公輔曰金液還丹之未鍊是為愚癡若鍊而不知止則反傷其丹故鍾離詩曰藥熟不須行火候更行火候必傷丹六十二須將死户為生户莫執生門號死門若會殺機明返覆始知害裏却生恩袁公輔曰人知生必有死不知死有可逃之理往往背生而趨死樂而不悔度人經云鬼道樂兮當人生門若能轉生殺之機明返覆之理則死可返生也陰符經曰生者死之根死者生之根恩生於害害生於恩是也六十三禍福由來互倚伏還如影響相隨逐若能轉此生殺機返掌之間灾變福袁公輔曰陽生而陰殺陽屬木木中藏火陰屬金金中生水舉世孰不知金能尅木水能尅火殺盡世人人無機變殊不知禍兮福所倚福兮禍所伏如影響之相逐也人能會此轉生殺之機則一返掌間灾可成福死可逃生言其易也陰符經曰相生相殺道之理也六十四修行混俗且和光圓即圓兮方即方顯晦逆從人莫測教人爭得見行藏老子曰和其光同其塵易曰和同天人之際實修行之祕要也隨方則方隨圓則圓即孟子所謂性猶水也决諸東方則東流决諸西方則西流之意晦與顯逆與順皆不可得而測識又豈能得見其行藏哉又絶句五首一饒君了悟真如性未免拋身却入身何似更兼修大藥頓超無漏作真人魏師吕先天大學書云易曰乾坤變化各正性命夫變化之道性自無中而有必藉命為體命自有中而無必以性為用性因情亂命逐色衰命盛則神全而性昌命衰則性弱而神昏夫性者道也神者用也靜也陽中之陰也命者生也體也動也陰中之陽也斯二者相需之不可闕故孤陽不立獨陰不成體用雙全方為妙道吕真人云了明空性不修丹萬劫陰靈難入聖竇真人曰參襌盡欲言間悟見性寧知夢裏非恰似狂猿勞水月如何捉得月光歸是也二投胎奪舍及移居舊住名為四果徒若解降龍並伏虎真金起屋幾時枯三鑑形閉氣思神法初出艱難後坦途倏忽雖能遊萬國奈何棄舊却移居右二章之義即平叔所謂推閉息一法若動而行之則可以入定出神奈何精神屬陰宅舍難固及常常用遷徙之法又豈能回陽换骨白日而登天者四釋氏教人修極樂亦緣極樂是金方大都色相惟兹實餘二非真謾度量釋氏修西方即金丹也雖以寂滅為要未嘗不由金華而至也不然何以謂之大覺金仙經曰如來成道本金華生自王宫勇出家委命假言身餵虎遺形借喻膝穿芽後之襌衲止以空寂為要曾不知金華之義惟傅大士得之曰希有希有佛妙理極泥丸云阿降伏住降伏住阿難是也昔龍女頓悟心珠便登佛位乃此法也平叔曰若修行之人厭此幻相不能修金丹便欲直趣如來真空湛然常寂此為究竟涅槃三昧則斯之身相斯之語言皆非所取也五俗語常言合聖道宜向其中細尋討能將日用顚倒求天地塵沙盡成寶欲語常言暗合聖道故道常在曰用之間而人由之而不知也五言女子著青衣郎君披素練葉士表曰離女木汞也坎男白金也袁公輔曰女子陰也青衣陽也陰中之陽也郎君陽也素練陰也陽中之陰也二物相需為用見之不可用用之不可見葉士表曰泄之於外者既不可得而用也用之於內者其可得而見耶無名子曰有質可見者後天查滓之類也無形而不可見者二物初弦之氣也故雖不可見而可用也恍惚裏相逢杳冥中有變葉士表曰二氣氤氲而成變化也一霎火焰飛真人自出現葉士表曰羣陰剝盡丹化為陽則陽神出入也吕真人曰九年火候真經過忽爾夭門頂中破真人出現大神通從此天仙可相賀是也修真十書悟真篇卷之二十八
