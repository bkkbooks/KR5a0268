  text: 修真十書悟真篇卷之二十九奈二
  hash: sha256:9b07dba4c3c1c6d6a1f02b1d27dfa6a22a612f1db8c765d91b59c20456bd8f11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0268_HFL_004-001a, image: hfl/0127/0127-050.png}
body:
  text: 西江月真人日西者金之方江者水之體月者藥之用一內藥還如外藥內通外亦須通丹頭和合類相同溫養萬般作用袁公輔曰內外之藥一同欲知內藥先知外藥也內外之藥皆用鉛汞為丹頭然溫養之法有兩般作用也真一子曰未有天地混沌之前真鉛得一以先形以漸生天地陰陽五行萬物也以先天之陽丹點己之陰汞立為純陽矣然後運在一身之內鍊成金液還丹以其造化在內故曰內藥也內藥十月功圓脫胎而形化為純陽之氣然後抱元九載使氣歸神以神合道升入無形是故內外二藥皆先天地之氣變豈可以後天地至陰之氣滿而為內藥耶夫外藥者金丹是也造化在二八爐中不生半箇時辰立得成就內藥者金液還丹是也造化在自己腹內須十箇月足方能脫胎神聖並二藥雖和合丹頭作用之法略同及其用功火候實相遠矣內有天然真火爐中赫赫長紅外爐增減要勤功妙絶無過真種袁公輔曰內藥則以自然真陽之火烹鍊外藥亦假火候抽添也真人以外藥竊比於內者要其實不若自己之真種子也無名子曰內丹雖有自然真火在土釜之中赫赫長紅亦須憑外爐勤功增減抽添運用無令差忒以至於殆也然內外真火變化無窮者實藉真鉛之妙絶也此物偏能擒汞不使飛走二藥內外雖異其用實一道也所以有內外二藥者人之一身稟天地秀氣而有生托陰陽陶鑄而成形故一形中以精氣為本神生於氣氣生於精然此三者皆後天地生一之氣至陰之物也修真之士無過冶鍊精氣神三物而已奈何三物俱後天地生純陰而無陽安能形化於純陽而出乎天地之外耶真一子曰孤陰不能自産當採先天之一氣以真陰真陽二八同類之物擒在一時辰之內鍊成一粒至陽之丹號曰真鉛造化在外故曰外藥以此陽丹擒己陰汞猶貓伏鼠陽丹是天之母氣己汞乃天之子氣以母氣伏子氣豈非同類乎此造化在內故曰內藥也真一子曰未有天地混沌之前真鉛得一而生以所生天地陰陽五行萬物此證金丹先天地之一氣也以先天陽丹點己陰汞化為純陽更假陰陽符火運用抽添十月功足形化為氣氣化為神神與道合而無形變化不測故能出乎天地之外立乎造化之表提挈天地陶鑄陰陽而不為陰陽陶鑄者先天地之一氣使然也故曰妙絶無過真種安可以後天至陰之氣類而為內藥邪安可以後天凡砂凡汞凡火滓質之類而為外藥耶二此道至神至聖憂君分薄難消調和鉛鼎不終朝早睹玄珠形兆真一子曰立創鼎器運動天機初則全無形質一如鴻濛混沌之中既經起火運符便應元年滋産此道可謂甚易也袁公輔曰此道神聖非有福緣者不可當也和合鉛氣又不在一日之內祗一時之間便見玄珠形兆矣參同契曰稽古當元皇關睢建始初冠婚氣相紐元年乃牙滋是也志士若能修鍊何拘在市居朝工夫容易藥非遙説破人須失笑袁公輔曰有志修鍊之士若得其法不拘市朝之間皆可為之工夫甚易藥物未遙説破無多事也老子曰下士聞道大笑之不笑不足以為道三白虎首經至寶葉士表曰首者頭首也白虎金晶也言金晶自崑崙之上經過此為至寶世人以女子天癸為首經非也袁公輔曰白虎即黑鉛也中涵真一之水為天地衆彙之先經緯萬物豈非至寶乎華池神水真金葉士表曰華池非口也凡修丹鼎中有金母華池亦謂之金胎神室乃丹田混元之宫也中有真一之精在天為天一之水言前金晶乃華池中神水之真金也故知上善利源深不比尋常藥品葉士表曰老子云上善若水此言神水其源深遠非世間尋常之藥可比也若要修成九轉先須鍊己持心依時採取定浮沉進火須防危甚葉士表曰九轉丹之成也若欲大丹之成非鍊己持心專精致志則不可也如此斯可依夭地升降定藥物浮沉進火採鍊也火候有進退抽添有時節危甚者恐有走失也四七返朱砂返本九還金液還真休將寅子數坤申但看五行成準葉士表曰七返者火之成數也九還者金之成數也言火汞金鉛返還於元海謂之七返九還非如古人以寅至申為七返自子至甲為九還也但看五行成數則知之矣無名子曰天一生水地六成水居北積坎陰之氣為真水故曰六居地二生火地七成火返南孕離氣而生砂故曰七返言朱砂返本也天三生木地八成木歸東處震位而為汞故曰八歸地四生金天九成金還西主兊位而為金故曰九還真體還真也天五生土地十成土居中而變成丹也故金丹不出五行而成豈可以寅子數坤申為九還七返耶本是水銀一味周流經歷諸辰陰陽氣足自然靈出入豈離玄牝葉士表曰鉛汞本一物耳鉛生汞汞化鉛如兊數七兊金也七則火之成數是火化為金也離數九離火也九則金之成數是金化為火也周流經歷乎十二辰位陰陽氣足而成靈藥出入不離乎玄牝之中也無名子曰真一之氣結而成精一變而為水在北二變而為砂在南三變而為汞在東四變而為金在西五變而為丹在中故丹非天地不生非日月不産非四時不全非五行不就非總數不成是以遍歷諸辰陰陽數足自然通神變化然其妙用造化出入不離玄牝之門真為天地根也五若要真鉛留汞親中不離家臣袁公輔曰此言非中宫金母不可也鉛為君為母汞為臣為子又曰鉛汞互為君臣木金間隔會無因須假黃婆媒娉袁公輔曰金木居東西二位升降浮沉互為明暗自然間隔無因相會若欲會合須坎離中氣升降然後匹配也木性愛金順義金情戀木慈仁相吞相啖却相親始覺男兒有孕葉士表曰五行相尅則為夫妻所以金木相吞相啖結為靈胎也蓋子母之氣相戀如此耳袁公輔曰古經云順則成人逆為丹用金木相尅自然之順也今使木見金不畏而成順義金遇木不尅而為慈仁蓋其中調和之者實戊己也正猶男子懷妊顚倒之意也大易志圖曰夫修金丹若無刑尅則藥物不伏如君令不嚴則臣下暴亂是故五行所以相尅金尅木者木歸金也木尅土者土歸水也土尅水者水歸土也水尅火者火歸水也火尅金者金歸火也五行十幹云甲為庚婦丙作壬妻他皆倣此故尅者為妻財諧和之義也若修至藥不明五行不解調和不知君臣不得銖兩枉費金土虛勞火力也六二八誰家姹女九三何處郎君自稱木液與金精遇土方成三姓葉士表曰二八姹女陰汞也九三郎君陽鉛也言此金鉛木汞遇中央之土則成三姓也更假丁公鍛鍊夫妻始結歡情葉士表曰言前二物得火烹鍊然後交結成丹也河車不敢暫留停運入崑崙峰頂葉士表曰河車者水車也般運神水自肘後飛入崑崙袁公輔曰河車者水火也言前鉛汞得大烹鍊不敢留停復歸太極之始也無名子曰河車左右單關轆轤各三十六又雙關轆轤三十六也七牛女情緣道合龜蛇類稟天然葉士表曰牛女二宿龜蛇二物同在一位也皆北方正氣之物如鉛汞先於一處皆天然性情氣類也袁公輔曰牛女二宿以歲周同度為天道之定理龜蛇二物以氣類相糾亦稟自然之性也無名子曰牛女二星一年一度交合太陰太陽一月一度交合龜蛇二靈亦以類蟠糾此皆陰陽二氣使之然也金丹作用一一如之蓋真一之氣窅然無形若不得二八陰陽之弦氣相交安能降格兆形黍粒者哉既得此黍粒之丹吞餌之後若不得陰陽符火氤氲安能變而成金液還丹哉真一子曰孤陰不自産寡陽不自成須假牝牡二氣方能有産化之道也蟾烏遇朔合嬋娟二氣相資運轉葉士表曰日月遇晦朔交合如鉛汞一日一交今也二氣運轉未嘗休息參同契曰晦朔之間合符行中混沌鴻濛牝牡相從滋液潤澤施行流通天地神靈不可度量利用安身隱形而藏始其東北箕斗之鄉旋而右轉嘔輸吐萌潛澤見象發散精光此言交合而又運轉也總是乾坤妙用誰能達此深淵陰陽否隔即成愆怎得天長地遠葉士表曰言上陰陽運轉交合皆乾坤妙用罕有人能達曉使天地不運轉則一氣停積萬物不生人若不運轉則一氣否塞不産丹藥豈得與天地同其長久耶袁公輔曰日月遇晦朔交合故能明照宇宙二氣往來運轉循環無窮皆天地乾坤妙用孰有達此深機者陰陽否塞不通則萬物不生而成亢旱積陰之咎人無陰陽運轉則人氣否塞不産丹藥豈得與天地同其長久耶參同契曰物無陰陽違天背源牝雞自卵其雛不全是也八雄裏內含雌質負陰抱却陽精兩般和合藥方成點化魄纖魂勝葉士表曰雄裏含雌乃陽中有陰砂中汞也負陰抱陽乃陰中有陽鉛內銀也鉛汞合和方成至藥點化凡軀陰消陽壯也無名子曰雄裏雌即龍之弦氣汞是也陰抱陽即虎之弦氣鉛是也二物相交合方生黍粒之丹吞入腹內丹田中點化陽魂以消陰魄也信道金丹一粒蛇吞立化龍形雞餐亦乃變鸞鵬飛入青陽真境無名子曰一粒如黍雞蛇得而吞之即化為龍鳳言丹之神聖也九天地才經否泰朝昏好識屯蒙輻來湊轂水朝宗妙在抽添運用袁公輔曰此言二氣交感如天地一經否泰故能生育萬物朝屯暮蒙為六十卦符火之首一一當細認也茍得其法則金丹不難成如輻來湊轂水去朝海其妙在抽添運用也無名子曰運火始於屯蒙休功於否泰日夕般運符火歸於鼎中如車之輪輻湊於轂若百川之水朝宗於海運用抽添妙化如此得一萬般皆畢休分南北西東損之又損愼前功命寶不宜輕弄葉士表曰得一太一含真也含真成丹然後不用四象也損去世事日愼一日稍或放逸則失前功此養命之寶不宜輕弄也袁公輔曰老子云得其一萬事畢又曰天得一以清地得一以寧谷得一以盈人得一以靈苟得其一矣奚用東西南北耶損之又損庶幾不廢前功而受後禍此養命之寶不宜輕弄也無名子曰一因陰陽之大而有象也及得一吞歸五內須依舊如前運火以謹前功方能盡得一之道不可妄動恐失寶珠十冬至一陽來復三旬增一陽爻月中復卦朔超望罷乾終姤兆日又别為寒暑陽生復起中宵午時姤象一陰朝鍊藥須知昏曉葉士表曰有年中冬至有月中冬至有日中冬至此用日中冬至以人度合天度以日用參年用也前詩云以時易日法神功是也真一子曰年與月同月與日同日與時同參同契曰若遂結舌瘖絶道獲罪誅寫情著竹帛恐泄天之符無名子曰自冬至一陽來復每三十日增一陽爻至六陽乾卦乃為陽火之候陽極則陰生故自夏至一陰生之後每三十日增一陰爻至六陰月為坤卦乃為陰符之候陰極陽生周而復始此一年加減之數也聖人後此一年之數於一月之中以朔旦為復卦兩日半當三十日至十五望日為純陽乾卦至十六日為姤卦一陰生故曰望罷乾終姤兆陰氣初萌謂之兆此是一月之內周天數也又將一月之候移在一日之中分寒暑溫涼四時之氣故以中夜子時一陽生為復卦午時一陰生為姤卦運用符火抽添進退一一合天地四時陰陽升降不得分毫差忒故曰鍊藥須知昏曉此一日之內周天數也十一德行修逾八百陰功積滿三千均齊物我與親寃始合神仙本願虎兕刀兵不害無常火宅難牽寶符降後去朝天穩駕鸞車鳳輦袁公輔曰古之神仙未有不修陰功而得升仙者也要之物我兩齊寃親俱釋乃神仙素志也丹成之後功德備著膺符受籙驂鸞翳鳳豈虎兕刀兵所能加害無常火宅所能牽繫者乎老子曰陸行不避兕虎入軍不避甲兵夫何故以其無死地參同契曰明者省厥旨曠然知所由勤而行之夙夜不殆服食三載輕舉遠遊跨火不焦入水不濡能存能亡長樂無憂道成德備潛伏候時太一乃召移居中洲功滿上升應籙受圖十二不辨五行四象那分朱汞鉛銀修丹火候未曾聞早便稱呼居隱不肯自思己錯更將錯路教人悮他永劫在迷津似恁欺心安忍袁公輔曰今之學道之流不識五行四象是何事鉛汞是何物縱能辨别亦不知火候是何理便教公然當居隱之名傲然自滿以為他人莫己若也此猶庶幾及有受以金繒將旁門小法妄行傳授自以為無上至真之妙道心苟可欺天可欺乎若然者非大道之道也可不懼哉又一丹是色身至寶鍊成變化無窮更能性上究真宗決了無生妙用不待他身後世見前獲佛神通自從龍女著斯功爾後誰能繼踵葉士表曰夫金丹者已能通靈變化若欲即此金丹妙色之身證真金慈相巍巍堂堂為天人師示神通力普觀法界運無礙大悲平等之心莊嚴佛土廣宣妙法普度羣生則必兼以識心見性方遊斯道者龍女頓悟心珠便登佛位乃此法也若修行之人厭此初須不能修金丹便欲直趣如來真空湛然常寂此為究竟涅槃三昧則斯之身是斯之語言皆非所取也讀周易參同契大丹妙用法乾坤乾坤運兮五行分五行順兮常道有生有死五行逆兮丹體常靈常存陽主生陰主死一生一死一去一來此常道順理之自然者也聖人則之反此陰陽逆施造化立乾坤為鼎器盜先天一氣以為丹以丹鍊形入於無形與道冥冥道固無極仙豈有終一自虛無兆質兩儀固一開根四象不離二體八卦互為祖孫萬象生乎變動吉凶悔吝兹分百姓日用不知聖人能究本源顧易道妙盡乾坤之理遂托象於斯文否泰交則陰陽或升或降屯蒙作則動靜在朝在昏坎離為男女水火震兊乃龍虎魄魂守中則黃裳元吉遇亢則無位而尊既未愼萬物之終始復姤昭二氣之歸奔月虧盈應精神之衰旺日出沒令榮衛之寒溫冬至之日地下有一陽之氣上升為復卦人之元氣亦如之故進陽火至正月陰陽之氣相半自然相交為泰卦人之元氣亦然故曰否泰交則陰陽或升或降也聖人簇此一年氣候於一月三十日中以兩日半計三十辰以當一月故自月之一日以從太陽之光初萌為復卦用事至上弦初八日月明一半水金平分為泰卦用事至十六日以後月漸虧為姤卦用事下弦二十三日月虧一半金水平分為否卦用事故曰月虧盈應精神之盛衰也又移此一月氣候歸一日十二辰中子時一陽生故人之腎中有一陽純精之氣上升進陽火為復卦午時一陰生故人之心中有一陰至神之氣下降進陰符為姤卦故曰復姤昭二氣之歸奔也夫子時起陽火子為六陽之首故為朝用屯卦直事午時起陰符午為六陰之元故為昏用蒙卦直事故曰屯蒙作則動靜在朝在昏也一日一夜兩卦直事三十日計六十卦屯蒙為六十卦之始既未為六十卦之終終而復始始而復終故曰既永愼萬物之始終也夫修金丹先以真陰真陽之物立為爐鼎然後誘太極一氣為丹太極之氣茍不以真陰真陽之物而誘之則不能降靈成象是以參同契立乾坤二卦為爐鼎分坎離為藥物處於中宫其餘諸卦分在一月三十日內以運符火故乾坤者龍虎也震兊也夫婦也魂魄也坎離者鉛汞也水火也男女也情性也觸類而長之則不可勝紛矣原其至當而言之無過比喻真陰真陽之二物也以此二物合氣於中宫黃道之室而成丹故曰守中則黃裳元吉也既得丹餌非真火無以育其聖胎是以運元陽之氣為火火無定位周流六虛故曰遇亢則無位而尊也夫日出為晝日沒為夜聖人運動符火於一日一夜之中分擘陰陽寒暑之氣外應天符內合榮衛消長一身抽添運用溫養丹體故曰日出沒合榮衛之寒溫也夫天一生水在人曰精地二生火在人曰神人之精神榮衛一身當與天地陰陽四時五行之氣運行不息也本立言以明象既得象以忘言猶設象以指意悟其意則象捐達者惟簡惟易迷者愈惑愈繁故知修真上士讀參同契不在乎泥象執文已上皆魏真人以金丹之道至簡至易敷揚祕要故假易卦意寓於言俾學者悟其意以曉其言苟得金丹祕要則乾坤坎離震兊龍虎情性魂魄鉛汞水火之類皆可忌言矣茍明運火真機則屯蒙既未復姤否泰卦象爻銖皆可無用矣此仙翁恐學者讀參同契不曉真人之意惟只殢象執文而不知捐象忘言之意故作此以示同徒其仁慈濟物如此雖然自非至人口訣然亦未易以蹈其壺奧之萬一也修真十書悟真篇卷之二十
