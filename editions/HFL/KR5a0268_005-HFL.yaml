front:
  text: 修眞十書悟眞篇卷之三十柰三
  hash: sha256:92d706637cebdc99715518641c4e140791a336b4bf04a9a1fc74bec9ee63c9af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0268_HFL_005-001a, image: hfl/0127/0127-088.png}
body:
  text: 禪宗歌頌夫學道之人不通性理獨修金丹如此既性命之道未備則運心不普物我難齊又焉能究竟圓通迥超三界故楞嚴經云有十種仙皆於人中鍊心堅固精粹壽千萬歲若不修正覺三昩則報盡還來散入諸趣是以彌勒菩薩金剛經頌云饒君百萬劫終乆落空亡故此悟眞篇中先以神仙命術誘其修鍊次以諸佛妙用廣其神通終以眞如覺性遣其幻妄而歸於究竟空寂之本源矣性地頌一佛性非同異千燈共一光增之寧解溢减著且無傷取捨皆爲過焚漂總不妨見聞知覺法無一可猜量二如來妙體遍河沙萬象森羅無障遮會得圓通眞法眼始知三界是吾家三視之不可見其形及至呼之又却應莫道此聲如谷響若還無谷有何聲四一物含聞見覺知蓋諸塵境顯其機靈常一物尚非有四者憑何作所依五不移一步到西天端坐諸方在目前項後有光猶是幻雲生足下未爲仙六求生本自無生畏滅何曾暫滅眼見不如耳見口說爭如鼻說無罪福終日行不曾行終日坐何曾坐修善不成功德造惡元無罪過時人若未明心莫執此言亂做死後須見閻王難免鑊湯碓磨三界惟心三界惟心妙理萬物非此非彼無一物非我心無一物是我己見物便見心見物便見心無物心不現十方通塞中眞心無不遍若生知識解却成顚倒見睹境能無心始見菩提面圓通見了眞空空不空圓明何處不圓通根塵心法都無物妙用方知與物同隨他萬物縱横在目前隨他動靜任譁讙圓明定慧終無染似水生蓮蓮自乾寳月一輪明月當虚空萬國清光無障礙收之不聚撥不開前之不進後不退彼非遠兮此非近表非外兮裏非内同中有異異中同問你傀儡會不會心經頌藴諦根塵空色都無一法堪言顚倒之見已盡寂靜之體翛然人我我不異人人心自異人有親疏我無彼此水陸飛行等觀一體貴賤尊卑首足同己我尚非我何嘗有你彼此俱無衆泡歸水讀雪竇禪師祖英集曹溪一水分千派照古澄今無滯礙近來學者不窮源妄指蹄窪爲大海雪竇老師達眞趣大震雷音推法鼓獅王哮吼出窟來百獸千邪皆恐懼或歌詩或語句丁寧指引迷人路言辭磊落義高深擊玉敲金響千古爭奈迷人逐境留却將言相尋名數眞如實相本無言無下無高無有邊非色非空非二體十方塵刹一輪圓正定何曾分語默取不得兮捨不得但於諸相不留心即是如來眞軌則爲除妄相將眞對妄若不生眞亦晦能知眞妄兩俱非方得眞心無罣礙無罣礙兮能自在一悟頓消窮劫罪不施功力證菩提從此水離生死海吾師近而言語暢留在世間爲榜様昨宵被我唤將來把鼻孔穿放杖上問他第一義如何却道有言皆是謗戒定慧解夫戒定慧者乃法中之妙用也佛祖雖嘗有言而未達者有所執今略而言之庶資開悟然其心境兩忘一念不動曰戒覺性圓明内外瑩徹曰定隨縁應物妙用無窮曰慧此三者相須而成互爲體用或戒之爲體者則定慧爲其用定之爲體者則戒慧爲其用慧之爲體者則戒定爲其用三者未嘗斯須相離也猶如日假光而能照光假照以能明非光則不能照非照則不能明原其戒定慧者本乎一性光照明者本乎一日一尚非一三復何三三一俱忘湛然清淨即心是佛頌佛即心兮心即佛心佛從來皆妄物若知無佛復無心始是眞如法身佛法身佛没模様一顆圓光含萬象無體之體即眞體無相之相即實相非色非空非不空不動不靜不來往無異無同無有無難取難捨難聽望内外圓通到處通一佛國在一沙中一粒沙含大千界一箇身心萬箇同知之須會無心法不染不滯爲淨業善惡千端無所爲便是南無及迦葉採珠歌貧兒衣中珠本自圓明好不會自尋求却數他人寳數他寳終無益只是教君空費力爭如認取自家珍價直黄金千萬億此寳珠光最大遍照三千大千界從來不解少分毫剛被浮雲爲障礙自從認得此摩尼泡體空花誰更愛佛珠還與我珠同我性即歸佛性海珠非珠海非海坦然心量包法界任你塵囂滿眼前定慧圓明常自在不是空不是色内外皎然無壅塞六通神慧妙無窮自利利他寧解極見即了萬事畢絶學無爲度終日怕鋪白切兮如未兆嬰兒動止隨縁無固必不斷妄不修眞眞妄之心總屬塵從來萬法皆無相無相之中有法身法身即是天眞佛亦非人兮亦非物浩然充塞天地間只是希夷并恍惚姤不染光自明無法不從心裏生心若不生法自滅即知罪福本無形無佛修無法說丈夫智見自然别出言便作獅子鳴不似野牛論生滅襌定指迷歌如來禫性如水體靜風波自止興居湛湛常清不獨坐時方是今人靜坐取證不道全在見性性於見裏若明見向性中自定定成慧用無窮是名諸佛神通幾欲究其體用但見十方虚空空中杳無一物亦無希夷恍惚希恍既不可尋尋之却成乖失只此乖失兩字不可執爲憑據本心尚乃如空豈有得失能所但將萬法遣除遣令淨盡無餘豁然圓明自現便與諸佛無殊色身爲我桎梏且恁和光混俗舉動一切無心爭甚是非榮辱生身只是寄居逆旅主號毗盧毗盧不來不去乃知生滅無餘或問毗盧何似只爲有相不是眼前葉葉塵塵塵葉非同非異況此塵塵葉葉箇箇釋迦迦葉異則萬籟皆鳴同則一風都攝若要認得摩尼莫道得法方知有病用他藥療病差藥更何施心迷須假法照心悟法更不要又如昏鏡得磨痕姤自然滅了本爲心法皆妄故令離盡諸相諸相離了何如是名至眞無上若欲莊嚴佛土平等行慈救苦菩提本願雖深切莫相中有取此爲福慧雙圓當來授記居先斷常纖塵有染却於諸佛無縁翻念凡夫迷執盡被情愛染習只爲貪著情多常生胎卵化濕學道須教猛烈無情心剛似鐵直饒父母妻兒又與他人何别常守一顆圓光不見可欲思量萬法一時無著說甚地獄天堂然後我命在我空中無升無墮出没諸佛土中不離菩提本坐觀音三十二應我當亦從中證化現不可思議盡出逍遥之性我是無心禪客凡事不會揀擇昔時一箇黑牛今日渾身總白有時自歌自笑傍人道我神少爭知被褐之形内懷無價之寳更若見我談空恰似渾胡骨切淪吞棗此法唯佛能知凡愚豈解相表兼有修禪上人只學鬥口合脣誇我問答敏急却元不識主人蓋是尋枝摘葉不解窮究本根得根枝葉自茂無根枝葉難存便逞已握靈珠轉於人我難除與我靈源妙覺遠隔千里之殊此輩可傷可笑空說積年學道心高不肯問人枉使一生虚老乃是愚迷鈍根邪見業重爲因若向此生不悟後世爭免沉淪無心頌堪笑我心如頑如鄙兀兀騰騰任物安委不解修行亦不造罪不曾利人亦不私己不持戒律不徇忌諱不知禮樂不行仁義人間所能百無一會飢來喫飯渴來飲水困則打睡覺則行履熱則單衣寒則蓋被無思無量何憂何喜不悔不謀無念無意凡生榮辱逆旅而已林木棲鳥亦可爲比來且不禁去亦不止不避不來無讚無毁不厭醜惡不羡善美不趣靜室不遠鬧市不說人非不誇己是不厚尊崇不薄賤稚親愛寃仇大小内外哀樂得喪欽侮險易心無兩睹坦然一揆不爲福先不爲禍始感而後應迫而後起不畏鋒刀焉怕虎兕隨物稱呼豈拘名字眼不就色聲不來耳凡所有相皆屬妄僞男女形聲悉非定體體相無心不染不礙自在逍遥物莫能累妙覺光圓映徹表裏包裹六極無有遐邇光兮非兮如月在水取捨既難復何比擬了兹妙用迥然超彼或問所宗此而已矣西江月其一妄想不復强滅眞如何必希求本源自性佛齊修迷悟豈拘前後悟即刹那成佛迷時萬劫淪流若能一念契眞修滅盡恒沙罪姤其二本自無生無滅强作生滅區分只如罪福亦無根妙體何曾增損我有一輪明鏡從來只爲蒙昏今朝磨瑩照乾坤萬象昭然難隱其三我性入諸佛性諸方佛性皆然亭亭寒影照寒泉一月千潭普現小即毫毛莫識大時徧滿三千高低不約信方圓說甚短長深淺其四法法法元無法空空空亦非空靜喧語默本來同夢裏何勞說夢有用用中無用無功功裏施功還如果熟自然紅莫問如何修種其五善惡一時忌念榮枯都不關心晦明隱顯任浮沉隨分飢飡渴飲神靜湛然常寂不妨坐卧歌吟一池秋水碧仍深風動莫驚儘恁其六對境不須强滅假名權立菩提色空明暗本來齊眞妄休分兩體悟即便名淨土更無天竺曹溪誰言極樂在天西了即彌陀出世其七人我衆王壽者寧分彼此高低法身通照没吾伊念念不須尋覓見是何曾見是聞非未必聞非從來諸用不相知生死誰能礙你其八住相修行布施果報不離天人恰如仰箭射浮雲墜落只縁力盡爭似無爲實相還源返朴歸淳境忘情盡任天眞以證無生法忍其九魚兔若還入手自然忘却筌蹄渡河筏子上天梯到彼悉皆遺棄未悟須憑言說悟來言說成非雖然四句屬無爲此等仍須脱離其十悟了莫求寂滅隨縁且接羣迷斷常知見及提携方便指歸實際五眼三身四智六度萬行修齊圓光一顆好摩尼利物兼能自濟其十一我見時人談性只誇口急酬機及逢境界轉癡迷又與愚人何異說得便須行得方名言行無虧能將慧劍斬摩尼此號如來正智其十二欲了無生妙道莫非自見眞心眞身無相亦無音清淨法身只恁此道非無非有非中亦莫求尋二邊俱遣棄中心見了名爲上品後敍切以人之生也皆縁妄情而有其身有其身則有患若其無身患從何有夫欲免夫患者莫若體夫至道欲體夫至道莫若明夫本心故心者道之體也道者心之用也人能察心觀性則圓明之體自現無爲之用自成不假施功頓超彼岸此非心鏡朗然神珠廓明則何以使諸相頓離纖塵不染心源自在决定無生者哉然其明心體道之士身不能累其性境不能亂其眞則刀兵烏能傷虎兕烏能害巨焚大浸烏足爲虞達人心若明鏡鑑而不納隨機應物和而不唱故能持物而無傷也此所謂無上至眞之妙道也原其道本無名聖人强名道本无言聖人强言耳然則名言若寂則時流无以識其體而歸其眞是以聖人設教立言以顯其道故道因言而後顯言因道而返忘奈何此道至妙至微世人根性迷鈍執其有身而惡死悅生故卒難了悟黄老悲其貪著乃以修生之術順其所欲漸次導之以修生之要在金丹金丹之要在乎神水華池故道德陰符之教得以盛行於世有益人悅其生也然其言隱而理奥學者雖諷誦其文皆莫曉其義若不遇至人授之口訣縱揣量百種終莫能著其功而成其事豈非學者紛如牛毛而達者乃如麟角也伯端向己酉歲於成都遇師授丹法當年且主公傾背自後三傳與人三遭禍患皆不逾兩旬近方憶師之所戒云異日有與汝解韁脱鎖者當宜授之餘不許爾後欲解名籍而患此道人不知信遂撰此悟眞篇叙丹藥本末既成而求學者凑然而來觀而意勤心不甚怪乃擇而授之然而所授者皆非有鉅勢强力能持危拯溺慷慨特達能仁明道之士初再羅患心猶未知竟至於三乃省前過故知大丹之法至簡至易雖愚昧小人得而行之則立超聖地是以天意祕惜不許輕傳於非其人也而伯端不遵師語屢泄天機以其有身故每膺譴患此天之深戒如此之神且速敢不恐懼尅責自今以往當鉗口結舌雖鼎鑊居前刀劍加項亦無復敢言矣此悟眞篇中所歌詠犬丹藥物火候細微之㫖無不備悉好事者夙有仙骨觀之則智慮自明可以尋文解義豈須伯端區區之口授之矣如此乃天之所賜非伯端之趣傳也其如篇末歌頌談見性之法即上之所謂無爲妙覺之道也然無爲之道齊物爲心雖顯祕要終無過咎奈何凡夫縁業有厚薄性根有利鈍縱聞一音紛成異見故釋迦文殊所演法寳無非一乗而聽學者隨量會解自然成三乗之差此後若有根性猛利之士見聞此篇則知伯端得達磨六祖最上一乗之妙㫖可因一言而悟萬法也如其習氣尚餘則歸中小之見亦非伯端之咎矣修眞十書悟眞篇卷之三十
